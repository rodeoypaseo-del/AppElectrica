<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eléctrica PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {background:#000;color:#fff;text-align:center;}
.btn-pro {width:85%; margin:10px; font-size:18px;}
.resultado {color:#00eaff; font-size:22px; margin-top:15px;}
.lista {text-align:left; margin:20px;}
img {margin:10px 0;}
</style>
</head>

<body>

<h2 style="color:#00bcff; margin-top:20px;">⚡ ELÉCTRICA PRO</h2>

<!-- BOTONES -->
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#enchufe">🔌 ENCHUFE</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#llave">💡 LLAVE</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tablero">⚡ TABLERO</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#tanque">💧 TANQUE</button>

<hr>

<!-- CALCULADORA -->
<h4>CALCULADORA ELÉCTRICA</h4>

<input id="cliente" class="form-control w-75 mx-auto" placeholder="Nombre del cliente">
<br>
<input id="voltaje" class="form-control w-75 mx-auto" placeholder="Voltaje (ej: 220)">
<br>
<input id="potencia" class="form-control w-75 mx-auto" placeholder="Potencia (W)">
<br>

<button class="btn btn-primary btn-pro" onclick="calcular()">⚙ CALCULAR Y GUARDAR</button>

<div id="resultado" class="resultado"></div>

<hr>

<h4>📂 HISTORIAL DE TRABAJOS</h4>
<div id="historial" class="lista"></div>

<button class="btn btn-outline-danger btn-pro" onclick="borrarHistorial()">🗑 BORRAR TODO</button>

<!-- MODAL ENCHUFE -->
<div class="modal fade" id="enchufe">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content bg-dark text-white">
<div class="modal-header">
<h5>Esquemas Enchufe</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Schuko_plug_and_socket.svg" class="img-fluid">
<img src="https://via.placeholder.com/300">
</div>
</div>
</div>
</div>

<!-- MODAL LLAVE -->
<div class="modal fade" id="llave">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content bg-dark text-white">
<div class="modal-header">
<h5>Esquemas Llave</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<img src="https://via.placeholder.com/300">
<img src="https://via.placeholder.com/300">
</div>
</div>
</div>
</div>

<!-- MODAL TABLERO -->
<div class="modal fade" id="tablero">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content bg-dark text-white">
<div class="modal-header">
<h5>Esquemas Tablero</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<img src="https://via.placeholder.com/300">
<img src="https://via.placeholder.com/300">
</div>
</div>
</div>
</div>

<!-- MODAL TANQUE -->
<div class="modal fade" id="tanque">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content bg-dark text-white">
<div class="modal-header">
<h5>Automático de Tanque</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<p>Controla la bomba según el nivel de agua</p>
<img src="https://via.placeholder.com/300">
<img src="https://via.placeholder.com/300">
</div>
</div>
</div>
</div>

<script>
window.onload = function(){
mostrarHistorial();
}

function calcular(){
let cliente = document.getElementById("cliente").value;
let v = parseFloat(document.getElementById("voltaje").value);
let p = parseFloat(document.getElementById("potencia").value);

if(cliente=="" || isNaN(v) || isNaN(p) || v <= 0){
document.getElementById("resultado").innerHTML="⚠️ Completar datos correctamente";
return;
}

let i = p / v;
let fecha = new Date().toLocaleDateString();
let texto = fecha + " | " + cliente + " → " + i.toFixed(2) + " A";

document.getElementById("resultado").innerHTML = "Corriente: " + i.toFixed(2) + " A";

let datos = JSON.parse(localStorage.getItem("trabajos")) || [];
datos.push(texto);
localStorage.setItem("trabajos", JSON.stringify(datos));

mostrarHistorial();

document.getElementById("cliente").value = "";
document.getElementById("voltaje").value = "";
document.getElementById("potencia").value = "";
}

function mostrarHistorial(){
let lista = JSON.parse(localStorage.getItem("trabajos")) || [];
let html = "";

lista.forEach((item)=>{
html += "<div>🔧 " + item + "</div>";
});

document.getElementById("historial").innerHTML = html;
}

function borrarHistorial(){
localStorage.removeItem("trabajos");
mostrarHistorial();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
