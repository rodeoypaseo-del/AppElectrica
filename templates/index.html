<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELÉCTRICA PRO TOTAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#000;color:#fff;text-align:center;}
.btn-pro{width:90%;margin:5px;}

.linea{height:6px;margin:6px;border-radius:5px;background:gray;}

.energia{
background:linear-gradient(90deg, red, yellow, red);
background-size:200% 100%;
animation:flujo 1s linear infinite;
}
@keyframes flujo{
0%{background-position:0%}
100%{background-position:200%}
}

.luz{width:60px;height:60px;border-radius:50%;background:#222;margin:10px auto;}
.bomba{padding:10px;background:#222;margin:10px;}
</style>
</head>

<body>

<h2>⚡ ELÉCTRICA PRO TOTAL</h2>

<!-- BOTONES -->
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#simulador">SIMULADOR</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#industrial">INDUSTRIAL</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#planoreal">PLANO REAL</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#casa">CASA</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tablero">TABLERO PRO</button>
<button class="btn btn-secondary btn-pro" data-bs-toggle="modal" data-bs-target="#contactores">CONTACTORES</button>

<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#enchufe">ENCHUFE</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#llave">LLAVE</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tablero2">TABLERO</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#tanque">TANQUE</button>
<button class="btn btn-dark btn-pro" data-bs-toggle="modal" data-bs-target="#motor">MOTOR</button>

<!-- ================= MODALES ================= -->

<!-- SIMULADOR -->
<div class="modal fade" id="simulador"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">
<h5>⚡ Simulador</h5>
<button onclick="energia()">ENERGIZAR</button>
<button onclick="corte()">CORTAR</button>

<button onclick="toggleLuz()">LUZ</button>
<div id="luz" class="luz"></div>

<button onclick="toggleBomba()">BOMBA</button>
<div id="bomba" class="bomba">OFF</div>

<div id="fase" class="linea"></div>
</div></div></div></div>

<!-- INDUSTRIAL -->
<div class="modal fade" id="industrial"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">
<h5>🏭 Industrial</h5>
<button onclick="marcha()">MARCHA</button>
<button onclick="parada()">PARADA</button>
<div id="lineaMotor" class="linea"></div>
</div></div></div></div>

<!-- PLANO REAL -->
<div class="modal fade" id="planoreal"><div class="modal-dialog modal-xl"><div class="modal-content bg-dark text-white"><div class="modal-body">
<svg width="100%" height="400" style="background:#111">
<rect x="40" y="150" width="120" height="100" fill="black" stroke="white"/>
<circle cx="550" cy="80" r="25" fill="#222" stroke="white"/>
<rect x="550" y="260" width="60" height="40" fill="#222" stroke="white"/>
<line x1="160" y1="180" x2="550" y2="80" stroke="red" stroke-width="4"/>
<line x1="160" y1="210" x2="550" y2="80" stroke="cyan" stroke-width="4"/>
<line x1="160" y1="240" x2="550" y2="260" stroke="yellow" stroke-width="4"/>
</svg>
</div></div></div></div>

<!-- CASA -->
<div class="modal fade" id="casa"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">
🔴 FASE → LLAVE → LUZ<br>
🔵 NEUTRO DIRECTO<br>
🟡🟢 TIERRA GENERAL
</div></div></div></div>

<!-- ENCHUFE -->
<div class="modal fade" id="enchufe"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">
🔴 FASE | 🔵 NEUTRO | 🟡🟢 TIERRA
</div></div></div></div>

<!-- LLAVE -->
<div class="modal fade" id="llave"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">
🔴 FASE ENTRA Y SALE<br>
🔵 NEUTRO DIRECTO
</div></div></div></div>

<!-- TABLERO PRO -->
<div class="modal fade" id="tablero"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">
<h5>⚡ Tablero PRO</h5>
<div id="luzLinea" class="linea"></div><button onclick="toggle('luzLinea')">LUZ</button>
<div id="tomaLinea" class="linea"></div><button onclick="toggle('tomaLinea')">TOMA</button>
<div id="aireLinea" class="linea"></div><button onclick="toggle('aireLinea')">AIRE</button>
<div id="bombaLinea" class="linea"></div><button onclick="toggle('bombaLinea')">BOMBA</button>
<button onclick="sobrecarga()">🔥 SOBRECARGA</button>
<div id="estadoTablero"></div>
</div></div></div></div>

<!-- TABLERO SIMPLE -->
<div class="modal fade" id="tablero2"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">
FASE → TÉRMICA → DISYUNTOR
</div></div></div></div>

<!-- CONTACTORES -->
<div class="modal fade" id="contactores"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">
<div id="contA" class="linea"></div>
<div id="contB" class="linea"></div>
<button onclick="activarA()">A</button>
<button onclick="activarB()">B</button>
<button onclick="falla()">FALLA</button>
<button onclick="reset()">RESET</button>
</div></div></div></div>

<!-- TANQUE -->
<div class="modal fade" id="tanque"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">
<div id="tanqueLinea" class="linea"></div>
<button onclick="activarTanque()">ON</button>
<button onclick="apagarTanque()">OFF</button>
</div></div></div></div>

<!-- MOTOR -->
<div class="modal fade" id="motor"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">
<div id="motorLinea2" class="linea"></div>
<button onclick="activarMotor()">ON</button>
<button onclick="apagarMotor()">OFF</button>
</div></div></div></div>

<script>
let energiaOn=false,luzOn=false,bombaOn=false,A=false,B=false,fallo=false;

function energia(){energiaOn=true;fase.classList.add("energia");}
function corte(){energiaOn=false;fase.classList.remove("energia");luz.style.background="#222";bomba.innerHTML="OFF";}

function toggleLuz(){if(!energiaOn)return;luzOn=!luzOn;luz.style.background=luzOn?"yellow":"#222";}
function toggleBomba(){if(!energiaOn)return;bombaOn=!bombaOn;bomba.innerHTML=bombaOn?"💧 ON":"OFF";}

function marcha(){if(!energiaOn)return;lineaMotor.classList.add("energia");}
function parada(){lineaMotor.classList.remove("energia");}

function toggle(id){document.getElementById(id).classList.toggle("energia");}
function sobrecarga(){
estadoTablero.innerHTML="🔥 CORTE";
["luzLinea","tomaLinea","aireLinea","bombaLinea"].forEach(id=>document.getElementById(id).classList.remove("energia"));
}

function activarA(){if(fallo||B)return;A=true;contA.classList.add("energia");contB.classList.remove("energia");}
function activarB(){if(fallo||A)return;B=true;contB.classList.add("energia");contA.classList.remove("energia");}
function falla(){fallo=true;contA.classList.remove("energia");contB.classList.remove("energia");}
function reset(){fallo=false;A=false;B=false;contA.classList.remove("energia");contB.classList.remove("energia");}

function activarTanque(){tanqueLinea.classList.add("energia");}
function apagarTanque(){tanqueLinea.classList.remove("energia");}

function activarMotor(){motorLinea2.classList.add("energia");}
function apagarMotor(){motorLinea2.classList.remove("energia");}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
