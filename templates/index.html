<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ELÉCTRICA PRO MAX</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#000;color:#fff;text-align:center;}
.btn-pro{width:90%;margin:5px;}

.linea{height:6px;margin:6px;border-radius:5px;background:gray;}

.corriente{
background:linear-gradient(90deg, red, yellow, red);
background-size:200% 100%;
animation:flujo 1s linear infinite;
}
@keyframes flujo{
0%{background-position:0%}
100%{background-position:200%}
}

.falla{background:red !important;}

</style>
</head>

<body>

<h2>⚡ ELÉCTRICA PRO MAX</h2>

<button class="btn btn-success btn-pro" onclick="energia()">ENERGIZAR</button>
<button class="btn btn-danger btn-pro" onclick="corte()">CORTAR</button>

<hr>

<h4>⚡ SIMULACIÓN CORRIENTE</h4>
<div id="fase" class="linea"></div>
<div id="neutro" class="linea"></div>
<div id="tierra" class="linea"></div>

<hr>

<h4>🔥 FALLAS</h4>
<button onclick="fallaFase()">Fase cortada</button>
<button onclick="fallaNeutro()">Neutro cortado</button>
<button onclick="fallaTierra()">Sin tierra</button>
<button onclick="resetFalla()">Reset</button>

<div id="estadoFalla"></div>

<hr>

<h4>⚡ TABLERO INTELIGENTE</h4>
<div id="lineaTablero" class="linea"></div>
<button onclick="consumoAlto()">Simular sobrecarga</button>

<div id="estadoTablero"></div>

<hr>

<h4>📏 CÁLCULO PROFESIONAL</h4>
<input id="potencia" placeholder="Potencia (W)"><br><br>
<input id="voltaje" placeholder="Voltaje"><br><br>

<button onclick="calculoPro()">CALCULAR</button>

<div id="resultado"></div>

<script>

let energiaOn=false
let falla=false

function energia(){
energiaOn=true
updateCorriente()
}

function corte(){
energiaOn=false
fase.classList.remove("corriente")
neutro.classList.remove("corriente")
tierra.classList.remove("corriente")
}

function updateCorriente(){
if(!energiaOn || falla)return

fase.classList.add("corriente")
neutro.classList.add("corriente")
tierra.classList.add("corriente")
}

// FALLAS
function fallaFase(){
falla=true
fase.classList.add("falla")
estadoFalla.innerHTML="⚠️ FASE CORTADA"
corte()
}

function fallaNeutro(){
falla=true
neutro.classList.add("falla")
estadoFalla.innerHTML="⚠️ NEUTRO CORTADO"
corte()
}

function fallaTierra(){
falla=true
tierra.classList.add("falla")
estadoFalla.innerHTML="⚠️ SIN TIERRA"
}

function resetFalla(){
falla=false
fase.classList.remove("falla")
neutro.classList.remove("falla")
tierra.classList.remove("falla")
estadoFalla.innerHTML="OK"
}

// TABLERO
function consumoAlto(){
lineaTablero.classList.add("falla")
estadoTablero.innerHTML="🔥 SOBRECARGA - CORTE AUTOMÁTICO"
corte()
}

// CALCULO PRO
function calculoPro(){
let P=potencia.value
let V=voltaje.value

let I=P/V

let cable="1.5 mm"
let termica="10A"

if(I>10){cable="2.5 mm";termica="16A"}
if(I>16){cable="4 mm";termica="20A"}
if(I>20){cable="6 mm";termica="32A"}

resultado.innerHTML=
"Corriente: "+I.toFixed(2)+" A<br>"+
"Cable recomendado: "+cable+"<br>"+
"Térmica: "+termica
}

</script>

</body>
</html>
