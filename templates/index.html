<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eléctrica PRO TOTAL FINAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {background:#000;color:#fff;text-align:center;}
.btn-pro {width:90%; margin:5px;}
.linea{height:6px;margin:6px;border-radius:5px;background:gray;}
.luz{width:60px;height:60px;border-radius:50%;background:#222;margin:10px auto;}
.bomba{padding:10px;background:#222;margin:10px;}

.energia {
background: linear-gradient(90deg, red, yellow, red);
background-size: 200% 100%;
animation: flujo 1s linear infinite;
}
@keyframes flujo {
0% {background-position:0%;}
100% {background-position:200%;}
}

.luz-on {background:yellow; box-shadow:0 0 20px yellow;}
.bomba-on {background:#0f0;color:#000;font-weight:bold;}
.motor-on {background:red !important;}
</style>
</head>

<body>

<h2 style="color:#00bcff;">⚡ ELÉCTRICA PRO TOTAL</h2>

<!-- BOTONES -->
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#simulador">🧠 SIMULADOR</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#industrial">🏭 INDUSTRIAL</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#planoreal">🎨 PLANO REAL</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#planocasa">🏠 CASA</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tableroprof">⚡ TABLERO PRO</button>

<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#enchufe">🔌 ENCHUFE</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#llave">💡 LLAVE</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tablero">⚡ TABLERO</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#tanque">💧 TANQUE</button>
<button class="btn btn-dark btn-pro" data-bs-toggle="modal" data-bs-target="#motor">🏭 MOTOR</button>

<hr>

<!-- CALCULADORA -->
<h4>⚙ CALCULADORA + PRESUPUESTO</h4>
<input id="cliente" class="form-control w-75 mx-auto" placeholder="Cliente"><br>
<input id="voltaje" class="form-control w-75 mx-auto" placeholder="Voltaje"><br>
<input id="potencia" class="form-control w-75 mx-auto" placeholder="Potencia"><br>
<input id="materiales" class="form-control w-75 mx-auto" placeholder="Materiales"><br>
<input id="mano" class="form-control w-75 mx-auto" placeholder="Mano de obra"><br>

<button class="btn btn-primary btn-pro" onclick="calcular()">CALCULAR</button>

<div id="resultado"></div>
<div id="presupuesto"></div>

<button class="btn btn-success btn-pro" onclick="guardar()">💰 Guardar</button>
<button class="btn btn-success btn-pro" onclick="whatsapp()">📲 WhatsApp</button>
<button class="btn btn-light btn-pro" onclick="pdf()">🧾 PDF</button>

<hr>

<!-- CONSUMO -->
<h4>📊 CONSUMO</h4>
<input id="potenciaC" class="form-control w-75 mx-auto" placeholder="Potencia"><br>
<input id="horas" class="form-control w-75 mx-auto" placeholder="Horas/día"><br>
<button class="btn btn-warning btn-pro" onclick="consumo()">CALCULAR</button>
<div id="consumoRes"></div>

<hr>

<!-- HISTORIAL -->
<h4>📂 HISTORIAL</h4>
<div id="historial"></div>
<button class="btn btn-danger btn-pro" onclick="borrar()">BORRAR</button>

<!-- ================= MODALES ================= -->

<!-- SIMULADOR -->
<div class="modal fade" id="simulador">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">

<button class="btn btn-success" onclick="energia()">ENERGIZAR</button>
<button class="btn btn-danger" onclick="corte()">CORTAR</button>

<button onclick="llaveSim()">LUZ</button>
<div id="luz" class="luz"></div>

<button onclick="flotante()">BOMBA</button>
<div id="bomba" class="bomba">OFF</div>

<div id="fase" class="linea"></div>
<div id="neutro" class="linea"></div>
<div id="tierra" class="linea"></div>

<div id="estado">SIN ENERGÍA</div>

</div>
</div>
</div>
</div>

<!-- INDUSTRIAL -->
<div class="modal fade" id="industrial">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">

<button onclick="marcha()">MARCHA</button>
<button onclick="parada()">PARADA</button>

<div id="motorEstado">APAGADO</div>
<div id="lineaMotor" class="linea"></div>

</div>
</div>
</div>
</div>

<!-- PLANO REAL -->
<div class="modal fade" id="planoreal">
<div class="modal-dialog modal-xl">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">

<svg width="100%" height="420" style="background:#111">

<rect x="40" y="150" width="120" height="100" fill="black" stroke="white"/>
<text x="50" y="140" fill="white">TABLERO</text>

<rect x="300" y="100" width="50" height="50" fill="#222" stroke="white"/>
<text x="290" y="90" fill="white">LLAVE</text>

<circle cx="550" cy="80" r="25" fill="#222" stroke="white"/>
<text x="520" y="40" fill="white">LUZ</text>

<rect x="550" y="260" width="60" height="40" fill="#222" stroke="white"/>
<text x="520" y="320" fill="white">TOMA</text>

<line x1="160" y1="180" x2="300" y2="120" stroke="red" stroke-width="4"/>
<line x1="350" y1="120" x2="550" y2="80" stroke="red" stroke-width="4"/>
<line x1="160" y1="180" x2="550" y2="260" stroke="red" stroke-width="4"/>

<line x1="160" y1="210" x2="550" y2="80" stroke="cyan" stroke-width="4"/>
<line x1="160" y1="210" x2="550" y2="260" stroke="cyan" stroke-width="4"/>

<line x1="160" y1="240" x2="550" y2="260" stroke="yellow" stroke-width="4"/>

</svg>

</div>
</div>
</div>
</div>

<!-- CASA -->
<div class="modal fade" id="planocasa">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
🔴 FASE → LLAVE → LUZ  
🔵 NEUTRO → DIRECTO  
🟡🟢 TIERRA → GENERAL
</div>
</div>
</div>
</div>

<!-- ENCHUFE -->
<div class="modal fade" id="enchufe">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<div style="height:6px;background:red;"></div>
<div style="height:6px;background:cyan;"></div>
<div style="height:6px;background:yellow;"></div>
🔴 FASE | 🔵 NEUTRO | 🟡🟢 TIERRA
</div>
</div>
</div>
</div>

<!-- LLAVE -->
<div class="modal fade" id="llave">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<div style="height:6px;background:red;"></div>
<div style="height:6px;background:cyan;"></div>
🔴 FASE → LUZ  
🔵 NEUTRO DIRECTO
</div>
</div>
</div>
</div>

<!-- TABLERO -->
<div class="modal fade" id="tablero">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">

<div id="faseTab" class="linea"></div>
<div style="height:6px;background:cyan;"></div>
<div style="height:6px;background:yellow;"></div>

<button onclick="activarTablero()">ENERGIZAR</button>

</div>
</div>
</div>
</div>

<!-- TANQUE -->
<div class="modal fade" id="tanque">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">

<div id="faseTanque" class="linea"></div>

<button onclick="activarTanque()">ENCENDER</button>
<button onclick="apagarTanque()">APAGAR</button>

</div>
</div>
</div>
</div>

<!-- MOTOR -->
<div class="modal fade" id="motor">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">

<div id="faseMotor" class="linea"></div>

<button onclick="activarMotor()">ENCENDER</button>
<button onclick="apagarMotor()">APAGAR</button>

</div>
</div>
</div>
</div>

<script>
let energiaOn=false,luzOn=false,flotanteOn=false,ultimo="";

function energia(){
energiaOn=true;
fase.classList.add("energia");
neutro.style.background="cyan";
tierra.style.background="yellow";
estado.innerHTML="ENERGÍA ACTIVA";
update();
}

function corte(){
energiaOn=false;
fase.classList.remove("energia");
fase.style.background="gray";
neutro.style.background="gray";
tierra.style.background="gray";
estado.innerHTML="SIN ENERGÍA";
}

function llaveSim(){luzOn=!luzOn;update();}
function flotante(){flotanteOn=!flotanteOn;update();}

function update(){
luz.style.background=(energiaOn&&luzOn)?"yellow":"#222";
bomba.innerHTML=(energiaOn&&flotanteOn)?"BOMBA ON":"OFF";
}

function marcha(){lineaMotor.classList.add("motor-on");}
function parada(){lineaMotor.classList.remove("motor-on");}

function activarTablero(){faseTab.classList.add("energia");}
function activarTanque(){faseTanque.classList.add("energia");}
function apagarTanque(){faseTanque.classList.remove("energia");}
function activarMotor(){faseMotor.classList.add("energia");}
function apagarMotor(){faseMotor.classList.remove("energia");}

function calcular(){
let i=potencia.value/voltaje.value;
let total=(+materiales.value||0)+(+mano.value||0);
resultado.innerHTML=i.toFixed(2)+" A";
presupuesto.innerHTML="$"+total;
ultimo=cliente.value+" $"+total;
}

function whatsapp(){window.open("https://wa.me/?text="+encodeURIComponent(ultimo));}
function pdf(){let w=window.open("");w.document.write(ultimo);w.print();}
function consumo(){consumoRes.innerHTML=((potenciaC.value*horas.value*30)/1000).toFixed(2)+" kWh";}
function guardar(){let d=JSON.parse(localStorage.getItem("h"))||[];d.push(ultimo);localStorage.setItem("h",JSON.stringify(d));mostrar();}
function mostrar(){let d=JSON.parse(localStorage.getItem("h"))||[];historial.innerHTML=d.join("<br>");}
function borrar(){localStorage.removeItem("h");mostrar();}
window.onload=mostrar;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
