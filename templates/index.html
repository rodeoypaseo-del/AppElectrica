<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>⚡ ULTRA NIVEL PRO REAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#000;color:#fff;text-align:center;}
.btn-pro{width:90%;margin:5px;}

.linea{height:6px;margin:6px;border-radius:5px;background:gray;}

.energia{
background:linear-gradient(90deg, red, yellow, red);
background-size:200% 100%;
animation:flujo 1s linear infinite;
}
@keyframes flujo{
0%{background-position:0%}
100%{background-position:200%}
}

.falla{background:red !important;}
.ok{color:#00ffcc}
.alerta{color:red}

.luz{width:60px;height:60px;border-radius:50%;background:#222;margin:10px auto;}
</style>
</head>

<body>

<h2>⚡ ULTRA NIVEL PRO REAL ⚡</h2>

<button class="btn btn-success btn-pro" onclick="energia()">ENERGIZAR</button>
<button class="btn btn-danger btn-pro" onclick="corte()">CORTAR</button>

<hr>

<h4>⚡ SIMULADOR</h4>
<div id="fase" class="linea"></div>
<div id="neutro" class="linea"></div>
<div id="tierra" class="linea"></div>

<button onclick="toggleLuz()">LUZ</button>
<div id="luz" class="luz"></div>

<hr>

<h4>📟 AMPERÍMETRO</h4>
<input id="potencia" placeholder="Potencia (W)">
<input id="voltaje" placeholder="Voltaje" value="220">
<div id="amp" class="ok"></div>

<hr>

<h4>🧠 PROTECCIONES</h4>
<button onclick="sobrecarga()">Sobrecarga</button>
<button onclick="fuga()">Fuga a tierra</button>
<button onclick="reset()">RESET</button>
<div id="estadoProt"></div>

<hr>

<h4>⚡ TABLERO</h4>
<div id="luzLinea" class="linea"></div>
<div id="tomaLinea" class="linea"></div>
<button onclick="toggleLinea('luzLinea')">LUZ</button>
<button onclick="toggleLinea('tomaLinea')">TOMA</button>

<hr>

<h4>⚙ CONTACTORES (ENCLAVAMIENTO)</h4>
<div id="contA" class="linea"></div>
<div id="contB" class="linea"></div>
<button onclick="Aon()">A</button>
<button onclick="Bon()">B</button>

<hr>

<h4>💧 TANQUE AUTOMÁTICO</h4>
<div id="tanque" class="linea"></div>
<button onclick="tanqueOn()">Activar</button>
<button onclick="tanqueOff()">Desactivar</button>

<hr>

<h4>🏭 MOTOR</h4>
<div id="motor" class="linea"></div>
<button onclick="motorOn()">Encender</button>
<button onclick="motorOff()">Apagar</button>

<hr>

<h4>📏 CÁLCULO CABLE PRO</h4>
<input id="distancia" placeholder="Distancia (m)">
<button onclick="calculoCable()">Calcular</button>
<div id="cableRes"></div>

<script>

let energiaOn=false
let fallo=false
let A=false,B=false

function energia(){
energiaOn=true
fase.classList.add("energia")
neutro.classList.add("energia")
tierra.classList.add("energia")
}

function corte(){
energiaOn=false
fase.classList.remove("energia")
neutro.classList.remove("energia")
tierra.classList.remove("energia")
luz.style.background="#222"
}

function toggleLuz(){
if(!energiaOn)return
luz.style.background = (luz.style.background=="yellow")?"#222":"yellow"
}

// amperímetro
setInterval(()=>{
let P=potencia.value||0
let V=voltaje.value||220
let I=P/V
amp.innerHTML="Corriente: "+I.toFixed(2)+" A"
},500)

// protecciones
function sobrecarga(){
estadoProt.innerHTML="🔥 SOBRECARGA - CORTE"
corte()
}

function fuga(){
estadoProt.innerHTML="⚠️ FUGA A TIERRA - DISYUNTOR"
corte()
}

function reset(){
estadoProt.innerHTML="OK"
}

// tablero
function toggleLinea(id){
if(!energiaOn)return
document.getElementById(id).classList.toggle("energia")
}

// contactores enclavamiento
function Aon(){
if(B)return
contA.classList.add("energia")
contB.classList.remove("energia")
A=true;B=false
}

function Bon(){
if(A)return
contB.classList.add("energia")
contA.classList.remove("energia")
B=true;A=false
}

// tanque
function tanqueOn(){tanque.classList.add("energia")}
function tanqueOff(){tanque.classList.remove("energia")}

// motor
function motorOn(){motor.classList.add("energia")}
function motorOff(){motor.classList.remove("energia")}

// cálculo cable
function calculoCable(){
let P=potencia.value||0
let V=voltaje.value||220
let D=distancia.value||10

let I=P/V

let cable="1.5 mm"
if(I>10 || D>20) cable="2.5 mm"
if(I>16 || D>30) cable="4 mm"
if(I>25) cable="6 mm"

cableRes.innerHTML="Cable recomendado: "+cable
}

</script>

</body>
</html>
