<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>⚡ ULTRA PRO REAL FINAL</title>

<style>
body{background:#000;color:#fff;text-align:center;font-family:Arial}

.linea{
height:6px;
margin:6px;
border-radius:5px;
background:gray;
}

.fase{background:red;}
.neutro{background:cyan;}
.tierra{background:yellow;}

.corriente{
background:linear-gradient(90deg, red, yellow, red);
background-size:200% 100%;
animation:flujo 1s linear infinite;
}
@keyframes flujo{
0%{background-position:0%}
100%{background-position:200%}
}

.luz{
width:60px;height:60px;border-radius:50%;
background:#222;margin:10px auto;
}

.chispa{
position:absolute;
width:10px;height:10px;
background:orange;
border-radius:50%;
animation:chispa 0.3s infinite;
}
@keyframes chispa{
0%{transform:scale(1);opacity:1}
100%{transform:scale(3);opacity:0}
}

</style>
</head>

<body>

<h2>⚡ ULTRA PRO REAL FINAL</h2>

<button onclick="energizar()">ENERGIZAR</button>
<button onclick="cortar()">CORTAR</button>
<button onclick="corto()">⚡ CORTOCIRCUITO</button>

<hr>

<h3>🏠 PLANO REAL</h3>

<svg width="600" height="300" style="background:#111;border:2px solid #444">

<!-- TABLERO -->
<rect x="40" y="120" width="120" height="80" stroke="white" fill="black"/>
<text x="50" y="110">TABLERO</text>

<!-- LLAVE -->
<rect x="220" y="140" width="50" height="40" stroke="white" fill="#333"/>
<text x="225" y="130">LLAVE</text>

<!-- LAMPARA -->
<circle id="lampara" cx="500" cy="100" r="25" stroke="white" fill="#222"/>

<!-- TOMA -->
<rect x="480" y="200" width="60" height="40" stroke="white" fill="#222"/>

<!-- FASE -->
<line id="faseL" x1="160" y1="150" x2="220" y2="160" stroke="red" stroke-width="4"/>
<line id="faseL2" x1="270" y1="160" x2="500" y2="100" stroke="red" stroke-width="4"/>

<!-- NEUTRO -->
<line id="neutroL" x1="160" y1="170" x2="500" y2="100" stroke="cyan" stroke-width="4"/>

<!-- TIERRA -->
<line id="tierraL" x1="160" y1="190" x2="500" y2="220" stroke="yellow" stroke-width="4"/>

</svg>

<div>🔴 FASE | 🔵 NEUTRO | 🟡 TIERRA</div>

<hr>

<h3>💡 SIMULADOR</h3>

<button onclick="toggleLlave()">LLAVE</button>

<div id="luz" class="luz"></div>

<div id="fase" class="linea fase"></div>
<div id="neutro" class="linea neutro"></div>
<div id="tierra" class="linea tierra"></div>

<hr>

<h3>⚙ CONTACTOR (SONIDO REAL)</h3>

<button onclick="activarContactor()">ACTIVAR</button>
<button onclick="desactivarContactor()">DESACTIVAR</button>

<div id="contactorLinea" class="linea"></div>

<audio id="clickAudio">
<source src="https://www.soundjay.com/mechanical/sounds/relay-click-01.mp3">
</audio>

<hr>

<div id="chispas"></div>

<script>

let energia=false
let llave=false

function energizar(){
energia=true
update()
}

function cortar(){
energia=false
llave=false
update()
}

// LLAVE corta SOLO fase
function toggleLlave(){
if(!energia) return
llave=!llave
update()
}

function update(){

// corriente fase depende de llave
if(energia && llave){
fase.classList.add("corriente")
faseL.setAttribute("stroke","orange")
faseL2.setAttribute("stroke","orange")
}else{
fase.classList.remove("corriente")
faseL.setAttribute("stroke","red")
faseL2.setAttribute("stroke","red")
}

// neutro siempre conectado
if(energia){
neutro.classList.add("corriente")
}else{
neutro.classList.remove("corriente")
}

// tierra nunca lleva corriente visible
tierra.classList.remove("corriente")

// luz
if(energia && llave){
luz.style.background="yellow"
lampara.setAttribute("fill","yellow")
}else{
luz.style.background="#222"
lampara.setAttribute("fill","#222")
}

}

// ⚡ CORTO con chispas
function corto(){

if(!energia) return

let cont=document.getElementById("chispas")

for(let i=0;i<10;i++){
let s=document.createElement("div")
s.className="chispa"
s.style.left=(300+Math.random()*50)+"px"
s.style.top=(120+Math.random()*50)+"px"
cont.appendChild(s)

setTimeout(()=>s.remove(),300)
}

alert("⚠️ CORTOCIRCUITO")
}

// CONTACTOR con sonido real
function activarContactor(){
contactorLinea.classList.add("corriente")
clickAudio.currentTime=0
clickAudio.play()
}

function desactivarContactor(){
contactorLinea.classList.remove("corriente")
clickAudio.currentTime=0
clickAudio.play()
}

</script>

</body>
</html>
