<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eléctrica PRO TOTAL MAX</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {background:#000;color:#fff;text-align:center;}
.btn-pro {width:90%; margin:5px;}
.linea{height:6px;margin:6px;border-radius:5px;background:gray;}

.energia{
background: linear-gradient(90deg, red, yellow, red);
background-size:200% 100%;
animation: flujo 1s linear infinite;
}
@keyframes flujo{
0%{background-position:0%;}
100%{background-position:200%;}
}

.luz{width:60px;height:60px;border-radius:50%;background:#222;margin:10px auto;}
.bomba{padding:10px;background:#222;margin:10px;}
.motor-on{background:red !important;}
</style>
</head>

<body>

<h2 style="color:#00bcff;">⚡ ELÉCTRICA PRO TOTAL MAX</h2>

<!-- BOTONES -->
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#simulador">🧠 SIMULADOR</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#industrial">🏭 INDUSTRIAL</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#planoreal">🎨 PLANO REAL</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#planocasa">🏠 CASA</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tableroprof">⚡ TABLERO PRO</button>
<button class="btn btn-secondary btn-pro" data-bs-toggle="modal" data-bs-target="#contactores">🧠 CONTACTORES</button>

<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#enchufe">🔌 ENCHUFE</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#llave">💡 LLAVE</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tablero">⚡ TABLERO</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#tanque">💧 TANQUE</button>
<button class="btn btn-dark btn-pro" data-bs-toggle="modal" data-bs-target="#motor">🏭 MOTOR</button>

<hr>

<!-- CALCULADORA -->
<h4>⚙ CALCULADORA</h4>
<input id="voltaje" class="form-control w-75 mx-auto" placeholder="Voltaje"><br>
<input id="potencia" class="form-control w-75 mx-auto" placeholder="Potencia"><br>
<button class="btn btn-primary btn-pro" onclick="calcular()">CALCULAR</button>
<div id="resultado"></div>

<hr>

<!-- CABLE -->
<h4>📏 CABLE</h4>
<input id="potCable" class="form-control w-75 mx-auto" placeholder="Potencia"><br>
<input id="voltCable" class="form-control w-75 mx-auto" placeholder="Voltaje"><br>
<button class="btn btn-info btn-pro" onclick="calcularCable()">CALCULAR</button>
<div id="cableRes"></div>

<!-- ================= MODALES ================= -->

<!-- SIMULADOR -->
<div class="modal fade" id="simulador">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<button onclick="energia()">ENERGIZAR</button>
<button onclick="corte()">CORTAR</button>

<button onclick="llaveSim()">LUZ</button>
<div id="luz" class="luz"></div>

<button onclick="flotante()">BOMBA</button>
<div id="bomba" class="bomba">OFF</div>

<div id="fase" class="linea"></div>
<div id="neutro" class="linea"></div>
<div id="tierra" class="linea"></div>

</div>
</div>
</div>
</div>

<!-- INDUSTRIAL -->
<div class="modal fade" id="industrial">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<button onclick="marcha()">MARCHA</button>
<button onclick="parada()">PARADA</button>

<div id="lineaMotor" class="linea"></div>

</div>
</div>
</div>
</div>

<!-- CONTACTORES -->
<div class="modal fade" id="contactores">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="contA" class="linea"></div>
<div id="contB" class="linea"></div>

<button onclick="activarA()">A</button>
<button onclick="activarB()">B</button>
<button onclick="falla()">FALLA</button>
<button onclick="reset()">RESET</button>

</div>
</div>
</div>
</div>

<!-- TABLERO PRO -->
<div class="modal fade" id="tableroprof">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="luzLinea" class="linea"></div>
<button onclick="toggleLuz()">LUZ</button>

<div id="tomaLinea" class="linea"></div>
<button onclick="toggleToma()">TOMA</button>

<div id="aireLinea" class="linea"></div>
<button onclick="toggleAire()">AIRE</button>

<div id="bombaLinea" class="linea"></div>
<button onclick="toggleBomba()">BOMBA</button>

<button onclick="sobrecarga()">SOBRECARGA</button>

</div>
</div>
</div>
</div>

<!-- PLANO REAL -->
<div class="modal fade" id="planoreal">
<div class="modal-dialog modal-xl">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">

<svg width="100%" height="400" style="background:#111">
<rect x="40" y="150" width="120" height="100" fill="black" stroke="white"/>
<rect x="300" y="100" width="50" height="50" fill="#222" stroke="white"/>
<circle cx="550" cy="80" r="25" fill="#222" stroke="white"/>
<rect x="550" y="260" width="60" height="40" fill="#222" stroke="white"/>

<line x1="160" y1="180" x2="550" y2="80" stroke="red" stroke-width="4"/>
<line x1="160" y1="210" x2="550" y2="80" stroke="cyan" stroke-width="4"/>
<line x1="160" y1="240" x2="550" y2="260" stroke="yellow" stroke-width="4"/>
</svg>

</div>
</div>
</div>
</div>

<!-- CASA -->
<div class="modal fade" id="planocasa">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">
🔴 FASE → LLAVE → LUZ<br>
🔵 NEUTRO → DIRECTO<br>
🟡🟢 TIERRA → GENERAL
</div>
</div>
</div>
</div>

<!-- ENCHUFE -->
<div class="modal fade" id="enchufe">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">
🔴 FASE | 🔵 NEUTRO | 🟡🟢 TIERRA
</div>
</div>
</div>
</div>

<!-- LLAVE -->
<div class="modal fade" id="llave">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">
🔴 FASE → LUZ<br>
🔵 NEUTRO DIRECTO
</div>
</div>
</div>
</div>

<!-- TABLERO -->
<div class="modal fade" id="tablero">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">
FASE → TÉRMICA → DISYUNTOR
</div>
</div>
</div>
</div>

<!-- TANQUE -->
<div class="modal fade" id="tanque">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">
FASE → CONTACTOR → FLOTANTE → BOMBA
</div>
</div>
</div>
</div>

<!-- MOTOR -->
<div class="modal fade" id="motor">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">
FASE → CONTACTOR → MOTOR
</div>
</div>
</div>
</div>

<script>
function energia(){fase.classList.add("energia");}
function corte(){fase.classList.remove("energia");}
function llaveSim(){luz.style.background="yellow";}
function flotante(){bomba.innerHTML="ON";}

function marcha(){lineaMotor.classList.add("energia");}
function parada(){lineaMotor.classList.remove("energia");}

function activarA(){contA.classList.add("energia");}
function activarB(){contB.classList.add("energia");}
function falla(){contA.classList.remove("energia");contB.classList.remove("energia");}
function reset(){}

function toggleLuz(){luzLinea.classList.toggle("energia");}
function toggleToma(){tomaLinea.classList.toggle("energia");}
function toggleAire(){aireLinea.classList.toggle("energia");}
function toggleBomba(){bombaLinea.classList.toggle("energia");}
function sobrecarga(){}

function calcular(){
resultado.innerHTML=(potencia.value/voltaje.value).toFixed(2)+" A";
}

function calcularCable(){
let i=potCable.value/voltCable.value;
cableRes.innerHTML=i<10?"1.5mm":i<16?"2.5mm":"4mm+";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
