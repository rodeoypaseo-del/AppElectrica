<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eléctrica PRO TOTAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {background:#000;color:#fff;text-align:center;}
.btn-pro {width:90%; margin:5px;}
.linea{height:6px;margin:6px;border-radius:5px;background:gray;}
.luz{width:60px;height:60px;border-radius:50%;background:#222;margin:10px auto;}
.bomba{padding:10px;background:#222;margin:10px;}
.resultado{color:#00eaff;margin-top:10px;}
.lista{text-align:left;margin:20px;}
</style>
</head>

<body>

<h2 style="color:#00bcff;">⚡ ELÉCTRICA PRO TOTAL</h2>

<!-- BOTONES -->
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#simulador">🧠 SIMULADOR</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#industrial">🏭 INDUSTRIAL</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#planoreal">🎨 PLANO REAL</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#planocasa">🏠 CASA</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tableroprof">⚡ TABLERO PRO</button>

<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#enchufe">🔌 ENCHUFE</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#llave">💡 LLAVE</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tablero">⚡ TABLERO</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#tanque">💧 TANQUE</button>
<button class="btn btn-dark btn-pro" data-bs-toggle="modal" data-bs-target="#motor">🏭 MOTOR</button>

<hr>

<!-- ===== MODALES ===== -->

<!-- PLANO REAL (CORREGIDO) -->
<div class="modal fade" id="planoreal">
<div class="modal-dialog modal-xl">
<div class="modal-content bg-dark text-white">

<div class="modal-header">
<h5>🎨 Plano eléctrico real (cableado)</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body text-center">

<svg width="100%" height="420" style="background:#111;border:2px solid #444;border-radius:10px;">

<rect x="30" y="160" width="120" height="100" fill="black" stroke="white"/>
<text x="40" y="150" fill="white">TABLERO</text>

<circle cx="550" cy="90" r="25" fill="#222" stroke="white"/>
<text x="520" y="50" fill="white">LÁMPARA</text>

<rect x="550" y="270" width="60" height="40" fill="#222" stroke="white"/>
<text x="520" y="330" fill="white">TOMA</text>

<line x1="150" y1="190" x2="550" y2="90" stroke="red" stroke-width="4"/>
<line x1="150" y1="190" x2="550" y2="270" stroke="red" stroke-width="4"/>

<line x1="150" y1="220" x2="550" y2="90" stroke="cyan" stroke-width="4"/>
<line x1="150" y1="220" x2="550" y2="270" stroke="cyan" stroke-width="4"/>

<line x1="150" y1="250" x2="550" y2="270" stroke="yellow" stroke-width="4"/>

</svg>

<br><br>
<div>🔴 FASE | 🔵 NEUTRO | 🟡🟢 TIERRA</div>

</div>
</div>
</div>
</div>

<!-- SIMULADOR -->
<div class="modal fade" id="simulador">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">

<button class="btn btn-success" onclick="energia()">⚡ ENERGIZAR</button>
<button class="btn btn-danger" onclick="corte()">⛔ CORTAR</button>

<h5>💡 Luz</h5>
<button onclick="llave()">LLAVE</button>
<div id="luz" class="luz"></div>

<h5>💧 Bomba</h5>
<button onclick="flotante()">FLOTANTE</button>
<div id="bomba" class="bomba">OFF</div>

<div id="fase" class="linea"></div>
<div id="neutro" class="linea"></div>
<div id="tierra" class="linea"></div>

<div id="estado">SIN ENERGÍA</div>

</div>
</div>
</div>
</div>

<!-- INDUSTRIAL -->
<div class="modal fade" id="industrial">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">

<button class="btn btn-success" onclick="marcha()">🟢 MARCHA</button>
<button class="btn btn-danger" onclick="parada()">🔴 PARADA</button>

<div id="motorEstado">MOTOR APAGADO</div>
<div id="lineaMotor" class="linea"></div>

</div>
</div>
</div>
</div>

<!-- CASA -->
<div class="modal fade" id="planocasa">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">

<div style="height:6px;background:red;"></div>
<div style="height:6px;background:cyan;"></div>
<div style="height:6px;background:yellow;"></div>

<pre>
🔴 FASE → LLAVE → 💡 LUZ
🔴 FASE → 🔌 TOMAS
🔵 NEUTRO → directo
🟡🟢 TIERRA → general
</pre>

</div>
</div>
</div>
</div>

<!-- RESTO IGUAL -->
<!-- (enchufe, llave, tablero, tanque, motor ya están bien, no los toqué) -->

<script>
let energiaOn=false,luzOn=false,flotanteOn=false,motorOn=false;

function energia(){
energiaOn=true;
fase.style.background="red";
neutro.style.background="cyan";
tierra.style.background="yellow";
estado.innerHTML="⚡ ENERGIZADO";
update();
}

function corte(){
energiaOn=false;
motorOn=false;
fase.style.background="gray";
neutro.style.background="gray";
tierra.style.background="gray";
estado.innerHTML="⛔ SIN ENERGÍA";
luz.style.background="#222";
bomba.innerHTML="OFF";
lineaMotor.style.background="gray";
motorEstado.innerHTML="MOTOR APAGADO";
}

function llave(){luzOn=!luzOn;update();}
function flotante(){flotanteOn=!flotanteOn;update();}

function marcha(){
if(!energiaOn){
motorEstado.innerHTML="⚠️ SIN ENERGÍA";
return;
}
motorOn=true;
lineaMotor.style.background="red";
motorEstado.innerHTML="🟢 MOTOR EN MARCHA";
}

function parada(){
motorOn=false;
lineaMotor.style.background="gray";
motorEstado.innerHTML="🔴 MOTOR PARADO";
}

function update(){
luz.style.background=(energiaOn && luzOn)?"yellow":"#222";
bomba.innerHTML=(energiaOn && flotanteOn)?"💧 BOMBA ON":"OFF";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
