<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eléctrica PRO FINAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {background:#000;color:#fff;text-align:center;}
.btn-pro {width:90%; margin:8px;}
.resultado {color:#00eaff;margin-top:10px;}
.lista {text-align:left;margin:20px;}
</style>
</head>

<body>

<h2 style="color:#00bcff;">⚡ ELÉCTRICA PRO FINAL</h2>

<!-- BOTONES -->
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#enchufe">🔌 ENCHUFE</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#llave">💡 LLAVE</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tablero">⚡ TABLERO</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#imagenes">📷 IMÁGENES</button>

<hr>

<!-- CALCULADORA -->
<h4>⚙ CALCULADORA + PRESUPUESTO</h4>

<input id="cliente" class="form-control w-75 mx-auto" placeholder="Cliente"><br>
<input id="voltaje" class="form-control w-75 mx-auto" placeholder="Voltaje"><br>
<input id="potencia" class="form-control w-75 mx-auto" placeholder="Potencia"><br>
<input id="materiales" class="form-control w-75 mx-auto" placeholder="Materiales ($)"><br>
<input id="mano" class="form-control w-75 mx-auto" placeholder="Mano de obra ($)"><br>

<button class="btn btn-primary btn-pro" onclick="calcular()">CALCULAR</button>

<div id="resultado" class="resultado"></div>
<div id="presupuesto" class="resultado"></div>

<button class="btn btn-success btn-pro" onclick="guardar()">💰 GUARDAR</button>
<button class="btn btn-success btn-pro" onclick="whatsapp()">📲 WhatsApp</button>
<button class="btn btn-light btn-pro" onclick="pdf()">🧾 PDF</button>

<hr>

<!-- CONSUMO -->
<h4>📊 CONSUMO MENSUAL</h4>

<input id="potenciaC" class="form-control w-75 mx-auto" placeholder="Potencia (W)"><br>
<input id="horas" class="form-control w-75 mx-auto" placeholder="Horas/día"><br>

<button class="btn btn-warning btn-pro" onclick="consumo()">CALCULAR</button>

<div id="consumoRes" class="resultado"></div>

<hr>

<!-- HISTORIAL -->
<h4>📂 HISTORIAL</h4>
<div id="historial" class="lista"></div>
<button class="btn btn-danger btn-pro" onclick="borrar()">BORRAR TODO</button>

<!-- MODALES -->

<div class="modal fade" id="enchufe">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body">
🔴 Derecha<br>🔵 Izquierda<br>🟡🟢 Centro
</div></div></div></div>

<div class="modal fade" id="llave">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body">
🔴 Fase corta<br>🔵 Neutro directo
</div></div></div></div>

<div class="modal fade" id="tablero">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body">
Fase → térmica → disyuntor
</div></div></div></div>

<!-- IMÁGENES -->
<div class="modal fade" id="imagenes">
<div class="modal-dialog modal-fullscreen">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<img src="https://images.unsplash.com/photo-1581092588429-5a2b2b3f1c5d" style="width:100%;margin-bottom:20px;">
<img src="https://images.unsplash.com/photo-1581091012184-5c2d8c5c0d6d" style="width:100%;">
</div></div></div></div>

<script>

let ultimo="";

function calcular(){
let v=voltaje.value;
let p=potencia.value;
let m=parseFloat(materiales.value)||0;
let mo=parseFloat(mano.value)||0;

let i=p/v;
let total=m+mo;

resultado.innerHTML="Corriente: "+i.toFixed(2)+" A";
presupuesto.innerHTML="💰 Total: $"+total;

ultimo=cliente.value+" → $"+total+" ("+i.toFixed(2)+"A)";
}

function whatsapp(){
window.open("https://wa.me/?text="+encodeURIComponent(ultimo));
}

function pdf(){
let w=window.open("");
w.document.write("<h2>Presupuesto</h2><p>"+ultimo+"</p>");
w.print();
}

function consumo(){
let k=(potenciaC.value*horas.value*30)/1000;
consumoRes.innerHTML=k.toFixed(2)+" kWh/mes";
}

function guardar(){
let d=JSON.parse(localStorage.getItem("hist"))||[];
d.push(ultimo);
localStorage.setItem("hist",JSON.stringify(d));
mostrar();
}

function mostrar(){
let d=JSON.parse(localStorage.getItem("hist"))||[];
historial.innerHTML=d.join("<br>");
}

function borrar(){
localStorage.removeItem("hist");
mostrar();
}

window.onload=mostrar;

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
