<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Eléctrica</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; padding: 20px; text-align: center; }
        .btn-manual { background: #1a1a1a; border: 1px solid #00bcff; border-radius: 10px; padding: 20px; width: 100%; color: white; margin-bottom: 10px; font-weight: bold; }
        .img-esquema { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <h3>⚡ ELÉCTRICA PRO</h3>
    <br>
    <!-- BOTÓN MEDIDOR -->
    <button class="btn-manual" data-bs-toggle="modal" data-bs-target="#m1">🔌 VER MEDIDOR</button>

    <!-- VENTANA EMERGENTE -->
    <div class="modal fade" id="m1" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-info">
                <div class="modal-header"><h5 class="modal-title">Esquema Medidor</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <img src="https://pinimg.com" class="img-esquema">
                </div>
            </div>
        </div>
    </div>

    <script src="https://jsdelivr.net"></script>
</body>
</html>
