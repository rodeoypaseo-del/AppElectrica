<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eléctrica PRO MAX FINAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {background:#000;color:#fff;text-align:center;}
.btn-pro {width:90%; margin:6px;}
.resultado {color:#00eaff;margin-top:10px;}
.lista {text-align:left;margin:20px;}
.linea{height:4px;margin:5px;}
.rojo{background:red;}
.azul{background:cyan;}
.tierra{background:yellow;}
</style>
</head>

<body>

<h2 style="color:#00bcff;">⚡ ELÉCTRICA PRO MAX FINAL</h2>

<!-- BOTONES -->
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#plano">🎨 PLANO</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#enchufe">🔌 ENCHUFE</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#llave">💡 LLAVE</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tablero">⚡ TABLERO</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#tanque">💧 TANQUE</button>
<button class="btn btn-dark btn-pro" data-bs-toggle="modal" data-bs-target="#motor">🏭 MOTOR</button>
<button class="btn btn-primary btn-pro" data-bs-toggle="modal" data-bs-target="#reversible">🔄 REVERSIBLE</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#estrella">⚡ ESTRELLA</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#plc">🧠 PLC</button>
<button class="btn btn-secondary btn-pro" data-bs-toggle="modal" data-bs-target="#cable">📊 CABLE</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#imagenes">📷 IMÁGENES</button>

<hr>

<!-- CALCULADORA -->
<h4>⚙ CALCULADORA + PRESUPUESTO</h4>

<input id="cliente" class="form-control w-75 mx-auto" placeholder="Cliente"><br>
<input id="voltaje" class="form-control w-75 mx-auto" placeholder="Voltaje"><br>
<input id="potencia" class="form-control w-75 mx-auto" placeholder="Potencia"><br>
<input id="materiales" class="form-control w-75 mx-auto" placeholder="Materiales ($)"><br>
<input id="mano" class="form-control w-75 mx-auto" placeholder="Mano de obra ($)"><br>

<button class="btn btn-primary btn-pro" onclick="calcular()">CALCULAR</button>

<div id="resultado" class="resultado"></div>
<div id="presupuesto" class="resultado"></div>

<button class="btn btn-success btn-pro" onclick="guardar()">💰 GUARDAR</button>
<button class="btn btn-success btn-pro" onclick="whatsapp()">📲 WhatsApp</button>
<button class="btn btn-light btn-pro" onclick="pdf()">🧾 PDF</button>

<hr>

<!-- CONSUMO -->
<h4>📊 CONSUMO</h4>
<input id="potenciaC" class="form-control w-75 mx-auto" placeholder="Potencia"><br>
<input id="horas" class="form-control w-75 mx-auto" placeholder="Horas/día"><br>
<button class="btn btn-warning btn-pro" onclick="consumo()">CALCULAR</button>
<div id="consumoRes" class="resultado"></div>

<hr>

<!-- HISTORIAL -->
<h4>📂 HISTORIAL</h4>
<div id="historial" class="lista"></div>
<button class="btn btn-danger btn-pro" onclick="borrar()">BORRAR</button>

<!-- MODALES -->

<!-- PLANO -->
<div class="modal fade" id="plano">
<div class="modal-dialog modal-lg">
<div class="modal-content bg-dark text-white">
<div class="modal-body">
<h5>🎨 Plano</h5>
<div class="linea rojo"></div>
<div class="linea azul"></div>
<div class="linea tierra"></div>
<pre>Fase → llave → carga
Neutro directo
Tierra protección</pre>
</div></div></div></div>

<div class="modal fade" id="enchufe"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">🔴 derecha<br>🔵 izquierda<br>🟡🟢 centro</div></div></div></div>

<div class="modal fade" id="llave"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">🔴 corta fase</div></div></div></div>

<div class="modal fade" id="tablero"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">fase → térmica → disyuntor</div></div></div></div>

<div class="modal fade" id="tanque"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body">flotante → bomba</div></div></div></div>

<div class="modal fade" id="motor"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body text-center"><button onclick="motor='ON';update()">ON</button><button onclick="motor='OFF';update()">OFF</button><div id="m">OFF</div></div></div></div></div>

<div class="modal fade" id="reversible"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body text-center"><button onclick="rev('ADELANTE')">ADELANTE</button><button onclick="rev('ATRAS')">ATRAS</button><div id="r">PARADO</div></div></div></div></div>

<div class="modal fade" id="estrella"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body text-center"><button onclick="est()">ARRANCAR</button><div id="e">DETENIDO</div></div></div></div></div>

<div class="modal fade" id="plc"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body text-center"><button onclick="plc()">INICIAR</button><div id="p">OFF</div></div></div></div></div>

<div class="modal fade" id="cable"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body"><input id="amp" class="form-control"><br><button onclick="cab()">CALC</button><div id="cr"></div></div></div></div></div>

<div class="modal fade" id="imagenes">
<div class="modal-dialog modal-fullscreen">
<div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<img src="https://images.unsplash.com/photo-1581092588429-5a2b2b3f1c5d" style="width:100%;margin-bottom:20px;">
<img src="https://images.unsplash.com/photo-1581091012184-5c2d8c5c0d6d" style="width:100%;">
</div></div></div></div>

<script>
let ultimo="",motor="OFF";

function calcular(){
let i=potencia.value/voltaje.value;
let total=(+materiales.value||0)+(+mano.value||0);
resultado.innerHTML=i.toFixed(2)+" A";
presupuesto.innerHTML="$"+total;
ultimo=cliente.value+" $"+total;
}

function whatsapp(){window.open("https://wa.me/?text="+encodeURIComponent(ultimo));}

function pdf(){let w=window.open("");w.document.write(ultimo);w.print();}

function consumo(){consumoRes.innerHTML=((potenciaC.value*horas.value*30)/1000).toFixed(2)+" kWh";}

function guardar(){let d=JSON.parse(localStorage.getItem("h"))||[];d.push(ultimo);localStorage.setItem("h",JSON.stringify(d));mostrar();}

function mostrar(){let d=JSON.parse(localStorage.getItem("h"))||[];historial.innerHTML=d.join("<br>");}

function borrar(){localStorage.removeItem("h");mostrar();}

function update(){m.innerHTML=motor;}
function rev(x){r.innerHTML=x;}
function est(){e.innerHTML="⭐→🔺";}
function plc(){p.innerHTML="AUTO";}
function cab(){let i=amp.value;let s="1.5";if(i>10)s="2.5";if(i>16)s="4";if(i>25)s="6";cr.innerHTML=s+" mm²";}

window.onload=mostrar;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
