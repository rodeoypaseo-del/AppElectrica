<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELÉCTRICA PRO FINAL REAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#000;color:#fff;text-align:center;}
.btn-pro{width:90%;margin:5px;}

.linea{height:6px;margin:6px;border-radius:5px;background:gray;}

.energia{
background:linear-gradient(90deg, red, yellow, red);
background-size:200% 100%;
animation:flujo 1s linear infinite;
}

@keyframes flujo{
0%{background-position:0%}
100%{background-position:200%}
}

.luz{width:60px;height:60px;border-radius:50%;background:#222;margin:10px auto;}
.bomba{padding:10px;background:#222;margin:10px;}
</style>
</head>

<body>

<h2>⚡ ELÉCTRICA PRO FINAL</h2>

<!-- BOTONES -->
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#simulador">SIMULADOR</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#industrial">INDUSTRIAL</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tablero">TABLERO PRO</button>
<button class="btn btn-secondary btn-pro" data-bs-toggle="modal" data-bs-target="#contactores">CONTACTORES</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#tanque">TANQUE</button>
<button class="btn btn-dark btn-pro" data-bs-toggle="modal" data-bs-target="#motor">MOTOR</button>

<!-- ================= MODALES ================= -->

<!-- SIMULADOR -->
<div class="modal fade" id="simulador">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<h5>⚡ Simulador</h5>

<button onclick="energia()">ENERGIZAR</button>
<button onclick="corte()">CORTAR</button>

<h6>Luz</h6>
<button onclick="toggleLuz()">ON/OFF</button>
<div id="luz" class="luz"></div>

<h6>Bomba</h6>
<button onclick="toggleBomba()">ON/OFF</button>
<div id="bomba" class="bomba">OFF</div>

<div id="fase" class="linea"></div>

</div>
</div>
</div>
</div>

<!-- INDUSTRIAL -->
<div class="modal fade" id="industrial">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<h5>🏭 Motor Industrial</h5>

<button onclick="marcha()">MARCHA</button>
<button onclick="parada()">PARADA</button>

<div id="lineaMotor" class="linea"></div>

</div>
</div>
</div>
</div>

<!-- TABLERO -->
<div class="modal fade" id="tablero">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<h5>⚡ Tablero</h5>

<div id="luzLinea" class="linea"></div><button onclick="toggle('luzLinea')">LUZ</button>
<div id="tomaLinea" class="linea"></div><button onclick="toggle('tomaLinea')">TOMA</button>
<div id="aireLinea" class="linea"></div><button onclick="toggle('aireLinea')">AIRE</button>
<div id="bombaLinea" class="linea"></div><button onclick="toggle('bombaLinea')">BOMBA</button>

<br><br>
<button onclick="sobrecarga()">🔥 SOBRECARGA</button>
<div id="estadoTablero"></div>

</div>
</div>
</div>
</div>

<!-- CONTACTORES -->
<div class="modal fade" id="contactores">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<h5>🧠 Contactores</h5>

<div id="contA" class="linea"></div>
<div id="contB" class="linea"></div>

<button onclick="activarA()">A</button>
<button onclick="activarB()">B</button>
<button onclick="falla()">FALLA</button>
<button onclick="reset()">RESET</button>

<div id="estadoCont"></div>

</div>
</div>
</div>
</div>

<!-- TANQUE -->
<div class="modal fade" id="tanque">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<h5>💧 Bomba automática</h5>

<div id="tanqueLinea" class="linea"></div>

<button onclick="activarTanque()">ACTIVAR</button>
<button onclick="apagarTanque()">DESACTIVAR</button>

</div>
</div>
</div>
</div>

<!-- MOTOR -->
<div class="modal fade" id="motor">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<h5>🏭 Motor</h5>

<div id="motorLinea2" class="linea"></div>

<button onclick="activarMotor()">ENCENDER</button>
<button onclick="apagarMotor()">APAGAR</button>

</div>
</div>
</div>
</div>

<script>

// ===== ESTADOS =====
let energiaOn=false;
let luzOn=false;
let bombaOn=false;
let A=false,B=false,fallo=false;

// ===== SIMULADOR =====
function energia(){
energiaOn=true;
fase.classList.add("energia");
}

function corte(){
energiaOn=false;
fase.classList.remove("energia");
luz.style.background="#222";
bomba.innerHTML="OFF";
}

function toggleLuz(){
if(!energiaOn)return;
luzOn=!luzOn;
luz.style.background=luzOn?"yellow":"#222";
}

function toggleBomba(){
if(!energiaOn)return;
bombaOn=!bombaOn;
bomba.innerHTML=bombaOn?"💧 ON":"OFF";
}

// ===== INDUSTRIAL =====
function marcha(){
if(!energiaOn)return;
lineaMotor.classList.add("energia");
}

function parada(){
lineaMotor.classList.remove("energia");
}

// ===== TABLERO =====
function toggle(id){
document.getElementById(id).classList.toggle("energia");
}

function sobrecarga(){
estadoTablero.innerHTML="🔥 CORTE AUTOMÁTICO";
["luzLinea","tomaLinea","aireLinea","bombaLinea"].forEach(id=>{
document.getElementById(id).classList.remove("energia");
});
}

// ===== CONTACTORES =====
function activarA(){
if(fallo || B)return;
A=true;
contA.classList.add("energia");
contB.classList.remove("energia");
}

function activarB(){
if(fallo || A)return;
B=true;
contB.classList.add("energia");
contA.classList.remove("energia");
}

function falla(){
fallo=true;
contA.classList.remove("energia");
contB.classList.remove("energia");
}

function reset(){
fallo=false;A=false;B=false;
contA.classList.remove("energia");
contB.classList.remove("energia");
}

// ===== TANQUE =====
function activarTanque(){tanqueLinea.classList.add("energia");}
function apagarTanque(){tanqueLinea.classList.remove("energia");}

// ===== MOTOR =====
function activarMotor(){motorLinea2.classList.add("energia");}
function apagarMotor(){motorLinea2.classList.remove("energia");}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
