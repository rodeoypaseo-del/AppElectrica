<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>⚡ ELÉCTRICA PRO INDUSTRIAL REAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#000;color:#fff;text-align:center;}
.btn-pro{width:90%;margin:5px;}

.linea{height:6px;margin:6px;border-radius:5px;background:gray;}

.energia{
background:linear-gradient(90deg, red, yellow, red);
background-size:200% 100%;
animation:flujo 1s linear infinite;
}

@keyframes flujo{
0%{background-position:0%}
100%{background-position:200%}
}

.falla{background:red !important;}

.luz{width:60px;height:60px;border-radius:50%;background:#222;margin:10px auto;}
.bomba{padding:10px;background:#222;margin:10px;}
</style>
</head>

<body>

<h2>⚡ ELÉCTRICA PRO INDUSTRIAL REAL</h2>

<!-- BOTONES -->
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#simulador">SIMULADOR</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#industrial">INDUSTRIAL</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#planoreal">PLANO REAL</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tablero">TABLERO PRO</button>
<button class="btn btn-secondary btn-pro" data-bs-toggle="modal" data-bs-target="#contactores">CONTACTORES</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#tanque">TANQUE</button>
<button class="btn btn-dark btn-pro" data-bs-toggle="modal" data-bs-target="#motor">MOTOR</button>

<hr>

<!-- ================= SIMULADOR ================= -->
<div class="modal fade" id="simulador">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<button onclick="energia()">ENERGIZAR</button>
<button onclick="corte()">CORTAR</button>

<div id="fase" class="linea"></div>
<div id="neutro" class="linea"></div>
<div id="tierra" class="linea"></div>

<button onclick="toggleLuz()">LUZ</button>
<div id="luz" class="luz"></div>

<button onclick="toggleBomba()">BOMBA</button>
<div id="bomba" class="bomba">OFF</div>

</div>
</div>
</div>
</div>

<!-- ================= INDUSTRIAL ================= -->
<div class="modal fade" id="industrial">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<button onclick="marcha()">MARCHA</button>
<button onclick="parada()">PARADA</button>

<div id="motorLinea" class="linea"></div>

</div>
</div>
</div>
</div>

<!-- ================= PLANO REAL ================= -->
<div class="modal fade" id="planoreal">
<div class="modal-dialog modal-xl">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<svg width="100%" height="400" style="background:#111">

<!-- tablero -->
<rect x="30" y="150" width="120" height="100" fill="black" stroke="white"/>
<text x="40" y="140" fill="white">TABLERO</text>

<!-- llave -->
<rect x="250" y="150" width="50" height="50" fill="#333" stroke="white"/>
<text x="245" y="140" fill="white">LLAVE</text>

<!-- lampara -->
<circle cx="550" cy="80" r="25" fill="#222" stroke="white"/>
<text x="520" y="40" fill="white">LUZ</text>

<!-- toma -->
<rect x="550" y="260" width="60" height="40" fill="#222" stroke="white"/>
<text x="520" y="320" fill="white">TOMA</text>

<!-- cables -->
<line x1="150" y1="180" x2="250" y2="175" stroke="red" stroke-width="4"/>
<line x1="300" y1="175" x2="550" y2="80" stroke="red" stroke-width="4"/>
<line x1="150" y1="210" x2="550" y2="80" stroke="cyan" stroke-width="4"/>
<line x1="150" y1="240" x2="550" y2="260" stroke="yellow" stroke-width="4"/>

</svg>

</div>
</div>
</div>
</div>

<!-- ================= TABLERO ================= -->
<div class="modal fade" id="tablero">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="lineaTablero" class="linea"></div>

<button onclick="sobrecarga()">SOBRECARGA</button>
<div id="estadoTablero"></div>

</div>
</div>
</div>
</div>

<!-- ================= CONTACTORES ================= -->
<div class="modal fade" id="contactores">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="contA" class="linea"></div>
<div id="contB" class="linea"></div>

<button onclick="activarA()">A</button>
<button onclick="activarB()">B</button>
<button onclick="resetCont()">RESET</button>

</div>
</div>
</div>
</div>

<!-- ================= TANQUE ================= -->
<div class="modal fade" id="tanque">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="tanqueLinea" class="linea"></div>

<button onclick="activarTanque()">ON</button>
<button onclick="apagarTanque()">OFF</button>

</div>
</div>
</div>
</div>

<!-- ================= MOTOR ================= -->
<div class="modal fade" id="motor">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="motorReal" class="linea"></div>

<button onclick="activarMotor()">ON</button>
<button onclick="apagarMotor()">OFF</button>

</div>
</div>
</div>
</div>

<!-- ================= JS ================= -->
<script>

let energiaOn=false
let luz=false
let bomba=false

function energia(){
energiaOn=true
fase.classList.add("energia")
neutro.classList.add("energia")
tierra.classList.add("energia")
}

function corte(){
energiaOn=false
fase.classList.remove("energia")
neutro.classList.remove("energia")
tierra.classList.remove("energia")
}

function toggleLuz(){
if(!energiaOn)return
luz=!luz
luz?luzOn():luzOff()
}

function luzOn(){document.getElementById("luz").style.background="yellow"}
function luzOff(){document.getElementById("luz").style.background="#222"}

function toggleBomba(){
if(!energiaOn)return
bomba=!bomba
document.getElementById("bomba").innerHTML=bomba?"ON":"OFF"
}

function marcha(){
if(!energiaOn)return
motorLinea.classList.add("energia")
}

function parada(){
motorLinea.classList.remove("energia")
}

function sobrecarga(){
lineaTablero.classList.add("falla")
estadoTablero.innerHTML="🔥 CORTE AUTOMÁTICO"
corte()
}

let A=false,B=false
function activarA(){
if(B)return
contA.classList.add("energia")
contB.classList.remove("energia")
A=true;B=false
}
function activarB(){
if(A)return
contB.classList.add("energia")
contA.classList.remove("energia")
B=true;A=false
}
function resetCont(){
contA.classList.remove("energia")
contB.classList.remove("energia")
A=false;B=false
}

function activarTanque(){tanqueLinea.classList.add("energia")}
function apagarTanque(){tanqueLinea.classList.remove("energia")}

function activarMotor(){motorReal.classList.add("energia")}
function apagarMotor(){motorReal.classList.remove("energia")}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
