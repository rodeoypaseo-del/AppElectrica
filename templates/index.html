<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELÉCTRICA PRO TOTAL ULTRA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#000;color:#fff;text-align:center;}
.btn-pro{width:90%;margin:5px;}
.linea{height:6px;margin:6px;border-radius:5px;background:gray;}

.energia{
background:linear-gradient(90deg, red, yellow, red);
background-size:200% 100%;
animation:flujo 1s linear infinite;
}
@keyframes flujo{0%{background-position:0%}100%{background-position:200%}}

.luz{width:60px;height:60px;border-radius:50%;background:#222;margin:10px auto;}
.bomba{padding:10px;background:#222;margin:10px;}

.chispa{
width:20px;height:20px;background:orange;border-radius:50%;
position:absolute;animation:chispa 0.3s infinite;
}
@keyframes chispa{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(2);opacity:0;}
}
</style>
</head>

<body>

<h2>⚡ ELÉCTRICA PRO TOTAL ULTRA</h2>

<!-- BOTONES -->
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#simulador">SIMULADOR</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#industrial">INDUSTRIAL</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#planoreal">PLANO REAL</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tableroprof">TABLERO PRO</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#tanque">TANQUE</button>
<button class="btn btn-dark btn-pro" data-bs-toggle="modal" data-bs-target="#motor">MOTOR</button>

<hr>

<!-- SIMULADOR -->
<div class="modal fade" id="simulador">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<h5>⚡ Simulador real</h5>

<button onclick="energia()">ENERGIZAR</button>
<button onclick="corte()">CORTAR</button>

<button onclick="llave()">LLAVE</button>

<button onclick="toggleLuz()">LUZ</button>
<div id="luz" class="luz"></div>

<button onclick="toggleBomba()">BOMBA</button>
<div id="bomba" class="bomba">OFF</div>

<div id="fase" class="linea"></div>
<div id="neutro" class="linea"></div>
<div id="tierra" class="linea"></div>

<div id="chispa"></div>

</div>
</div>
</div>
</div>

<!-- INDUSTRIAL -->
<div class="modal fade" id="industrial">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<h5>🏭 Motor</h5>

<button onclick="marcha()">MARCHA</button>
<button onclick="parada()">PARADA</button>

<div id="lineaMotor" class="linea"></div>
<div id="estadoMotor"></div>

</div>
</div>
</div>
</div>

<!-- PLANO REAL -->
<div class="modal fade" id="planoreal">
<div class="modal-dialog modal-xl">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<svg width="100%" height="420" style="background:#111">

<text x="20" y="50" fill="red">FASE</text>
<text x="20" y="70" fill="cyan">NEUTRO</text>
<text x="20" y="90" fill="yellow">TIERRA</text>

<line x1="100" y1="100" x2="500" y2="100" stroke="red" stroke-width="4"/>
<line x1="100" y1="150" x2="500" y2="150" stroke="cyan" stroke-width="4"/>
<line x1="100" y1="200" x2="500" y2="200" stroke="yellow" stroke-width="4"/>

</svg>

</div>
</div>
</div>
</div>

<!-- TABLERO -->
<div class="modal fade" id="tableroprof">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="luzLinea" class="linea"></div>
<button onclick="toggle('luzLinea')">LUZ</button>

<div id="tomaLinea" class="linea"></div>
<button onclick="toggle('tomaLinea')">TOMA</button>

<button onclick="sobrecarga()">🔥 SOBRECARGA</button>
<div id="estadoTablero"></div>

</div>
</div>
</div>
</div>

<!-- TANQUE -->
<div class="modal fade" id="tanque">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="tanqueLinea" class="linea"></div>
<button onclick="activarTanque()">ON</button>
<button onclick="apagarTanque()">OFF</button>

</div>
</div>
</div>
</div>

<!-- MOTOR -->
<div class="modal fade" id="motor">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="motorLinea2" class="linea"></div>
<button onclick="activarMotor()">ON</button>
<button onclick="apagarMotor()">OFF</button>

</div>
</div>
</div>
</div>

<script>

// AUDIO CLICK
function clickSound(){
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.05);
}

// ESTADOS
let energiaOn=false;
let llaveOn=false;

// ENERGIA
function energia(){
energiaOn=true;
update();
}

function corte(){
energiaOn=false;
llaveOn=false;
update();
}

// LLAVE (corta solo fase)
function llave(){
llaveOn=!llaveOn;
clickSound();
update();
}

// UPDATE GENERAL
function update(){
if(energiaOn && llaveOn){
fase.classList.add("energia");
}else{
fase.classList.remove("energia");
}

if(energiaOn){
neutro.classList.add("energia");
tierra.classList.add("energia");
}else{
neutro.classList.remove("energia");
tierra.classList.remove("energia");
}
}

// LUZ Y BOMBA
function toggleLuz(){
if(!energiaOn || !llaveOn)return;
luz.style.background=luz.style.background=="yellow"?"#222":"yellow";
}

function toggleBomba(){
if(!energiaOn)return;
bomba.innerHTML=bomba.innerHTML=="OFF"?"💧 ON":"OFF";
}

// INDUSTRIAL
function marcha(){
if(!energiaOn)return;
clickSound();
lineaMotor.classList.add("energia");
estadoMotor.innerHTML="🟢 EN MARCHA";
}

function parada(){
lineaMotor.classList.remove("energia");
estadoMotor.innerHTML="🔴 PARADO";
}

// TABLERO
function toggle(id){
document.getElementById(id).classList.toggle("energia");
}

function sobrecarga(){
estadoTablero.innerHTML="🔥 CORTE";
["luzLinea","tomaLinea"].forEach(id=>{
document.getElementById(id).classList.remove("energia");
});
chispaCorto();
}

// CHISPA
function chispaCorto(){
let c=document.getElementById("chispa");
c.className="chispa";
setTimeout(()=>c.className="",500);
}

// TANQUE
function activarTanque(){tanqueLinea.classList.add("energia");}
function apagarTanque(){tanqueLinea.classList.remove("energia");}

// MOTOR
function activarMotor(){motorLinea2.classList.add("energia");}
function apagarMotor(){motorLinea2.classList.remove("energia");}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
