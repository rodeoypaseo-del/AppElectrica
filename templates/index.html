<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>⚡ ULTRA PRO FX REAL</title>

<style>
body{background:#000;color:#fff;text-align:center;font-family:Arial;}
.btn{margin:5px;padding:10px 20px;}

.cable{
stroke:gray;
stroke-width:4;
}

.energia{
stroke:url(#grad);
stroke-width:5;
stroke-dasharray:10;
animation:flujo 1s linear infinite;
}

@keyframes flujo{
0%{stroke-dashoffset:0}
100%{stroke-dashoffset:20}
}

.luz{
fill:#222;
transition:0.3s;
}

.on{fill:yellow;}

.spark{
fill:orange;
opacity:0;
animation:spark 0.3s infinite;
}

@keyframes spark{
0%{opacity:1;transform:scale(1);}
100%{opacity:0;transform:scale(2);}
}

</style>
</head>

<body>

<h2>⚡ ULTRA PRO FX REAL</h2>

<button onclick="energia()">ENERGIZAR</button>
<button onclick="corte()">CORTAR</button>
<button onclick="corto()">⚡ CORTOCIRCUITO</button>

<hr>

<svg width="600" height="300" style="background:#111">

<defs>
<linearGradient id="grad">
<stop offset="0%" stop-color="red"/>
<stop offset="50%" stop-color="yellow"/>
<stop offset="100%" stop-color="red"/>
</linearGradient>
</defs>

<!-- TABLERO -->
<rect x="20" y="120" width="100" height="80" fill="black" stroke="white"/>
<text x="25" y="110" fill="white">TABLERO</text>

<!-- LLAVE -->
<rect x="200" y="130" width="40" height="40" fill="#333" stroke="white"/>
<text x="190" y="120" fill="white">LLAVE</text>

<!-- LUZ -->
<circle id="luz" cx="450" cy="80" r="25" class="luz" stroke="white"/>

<!-- CABLES -->
<line id="fase1" x1="120" y1="150" x2="200" y2="150" class="cable"/>
<line id="fase2" x1="240" y1="150" x2="450" y2="80" class="cable"/>
<line id="neutro" x1="120" y1="180" x2="450" y2="80" class="cable"/>

<!-- CHISPAS -->
<circle id="spark" cx="300" cy="140" r="10" class="spark"/>

</svg>

<hr>

<h4>⚙ CONTACTOR</h4>
<div id="contactor" style="width:200px;height:10px;background:gray;margin:auto;"></div>
<button onclick="contactorOn()">ACTIVAR</button>
<button onclick="contactorOff()">DESACTIVAR</button>

<audio id="click">
<source src="https://actions.google.com/sounds/v1/impacts/metal_clank.ogg">
</audio>

<script>

let energiaOn=false

function energia(){
energiaOn=true
fase1.classList.add("energia")
fase2.classList.add("energia")
neutro.classList.add("energia")
luz.classList.add("on")
}

function corte(){
energiaOn=false
fase1.classList.remove("energia")
fase2.classList.remove("energia")
neutro.classList.remove("energia")
luz.classList.remove("on")
spark.style.opacity=0
}

// ⚡ corto con chispas
function corto(){
if(!energiaOn)return
spark.style.opacity=1
setTimeout(()=>spark.style.opacity=0,500)
corte()
alert("⚠️ CORTOCIRCUITO DETECTADO")
}

// contactor sonido real
function contactorOn(){
contactor.style.background="lime"
click.play()
}

function contactorOff(){
contactor.style.background="gray"
click.play()
}

</script>

</body>
</html>
