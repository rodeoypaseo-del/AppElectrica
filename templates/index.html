<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eléctrica PRO FINAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#000;color:#fff;text-align:center;}
.btn-pro{width:90%;margin:5px;}

.linea{height:6px;margin:6px;border-radius:5px;background:gray;}

.energia{
background:linear-gradient(90deg, red, yellow, red);
background-size:200% 100%;
animation:flujo 1s linear infinite;
}
@keyframes flujo{0%{background-position:0%}100%{background-position:200%}}

.luz{width:60px;height:60px;border-radius:50%;background:#222;margin:10px auto;}
.bomba{padding:10px;background:#222;margin:10px;}
</style>
</head>

<body>

<h2>⚡ ELÉCTRICA PRO FINAL</h2>

<!-- BOTONES -->
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#simulador">SIMULADOR</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#industrial">INDUSTRIAL</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tableroprof">TABLERO PRO</button>
<button class="btn btn-secondary btn-pro" data-bs-toggle="modal" data-bs-target="#contactores">CONTACTORES</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#tanque">TANQUE</button>
<button class="btn btn-dark btn-pro" data-bs-toggle="modal" data-bs-target="#motor">MOTOR</button>

<hr>

<!-- CALCULADORA -->
<h4>💰 PRESUPUESTO</h4>
<input id="cliente" class="form-control w-75 mx-auto" placeholder="Cliente"><br>
<input id="voltaje" class="form-control w-75 mx-auto" placeholder="Voltaje"><br>
<input id="potencia" class="form-control w-75 mx-auto" placeholder="Potencia"><br>
<input id="materiales" class="form-control w-75 mx-auto" placeholder="Materiales"><br>
<input id="mano" class="form-control w-75 mx-auto" placeholder="Mano de obra"><br>

<button onclick="calcular()" class="btn btn-primary btn-pro">CALCULAR</button>

<div id="resultado"></div>
<div id="presupuesto"></div>

<button onclick="guardar()" class="btn btn-success btn-pro">Guardar</button>
<button onclick="whatsapp()" class="btn btn-success btn-pro">WhatsApp</button>
<button onclick="pdf()" class="btn btn-light btn-pro">PDF</button>

<hr>

<h4>📊 CONSUMO</h4>
<input id="potenciaC" class="form-control w-75 mx-auto" placeholder="Potencia"><br>
<input id="horas" class="form-control w-75 mx-auto" placeholder="Horas"><br>
<button onclick="consumo()" class="btn btn-warning btn-pro">CALCULAR</button>
<div id="consumoRes"></div>

<hr>

<h4>📂 HISTORIAL</h4>
<div id="historial"></div>
<button onclick="borrar()" class="btn btn-danger btn-pro">BORRAR</button>

<!-- ================= MODALES ================= -->

<!-- SIMULADOR -->
<div class="modal fade" id="simulador">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<button onclick="energia()">ENERGIZAR</button>
<button onclick="corte()">CORTAR</button>

<button onclick="luzOn()">LUZ</button>
<div id="luz" class="luz"></div>

<button onclick="bombaOn()">BOMBA</button>
<div id="bomba" class="bomba">OFF</div>

<div id="fase" class="linea"></div>

</div>
</div>
</div>
</div>

<!-- INDUSTRIAL -->
<div class="modal fade" id="industrial">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<button onclick="marcha()">MARCHA</button>
<button onclick="parada()">PARADA</button>

<div id="lineaMotor" class="linea"></div>

</div>
</div>
</div>
</div>

<!-- TABLERO PRO -->
<div class="modal fade" id="tableroprof">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="luzLinea" class="linea"></div>
<button onclick="toggle('luzLinea')">LUZ</button>

<div id="tomaLinea" class="linea"></div>
<button onclick="toggle('tomaLinea')">TOMA</button>

<div id="aireLinea" class="linea"></div>
<button onclick="toggle('aireLinea')">AIRE</button>

<div id="bombaLinea" class="linea"></div>
<button onclick="toggle('bombaLinea')">BOMBA</button>

<button onclick="sobrecarga()">SOBRECARGA</button>

<div id="estadoTablero"></div>

</div>
</div>
</div>
</div>

<!-- CONTACTORES -->
<div class="modal fade" id="contactores">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="contA" class="linea"></div>
<div id="contB" class="linea"></div>

<button onclick="activarA()">A</button>
<button onclick="activarB()">B</button>
<button onclick="falla()">FALLA</button>
<button onclick="reset()">RESET</button>

<div id="estadoCont"></div>

</div>
</div>
</div>
</div>

<!-- TANQUE -->
<div class="modal fade" id="tanque">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="tanqueLinea" class="linea"></div>

<button onclick="activarTanque()">ENCENDER</button>
<button onclick="apagarTanque()">APAGAR</button>

</div>
</div>
</div>
</div>

<!-- MOTOR -->
<div class="modal fade" id="motor">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-body">

<div id="motorLinea" class="linea"></div>

<button onclick="activarMotor()">ENCENDER</button>
<button onclick="apagarMotor()">APAGAR</button>

</div>
</div>
</div>
</div>

<script>
// SIMULADOR
function energia(){fase.classList.add("energia")}
function corte(){fase.classList.remove("energia")}
function luzOn(){luz.style.background="yellow"}
function bombaOn(){bomba.innerHTML="ON"}

// INDUSTRIAL
function marcha(){lineaMotor.classList.add("energia")}
function parada(){lineaMotor.classList.remove("energia")}

// TABLERO PRO
function toggle(id){
document.getElementById(id).classList.toggle("energia")
}

function sobrecarga(){
estadoTablero.innerHTML="🔥 TÉRMICA DISPARADA"
luzLinea.classList.remove("energia")
tomaLinea.classList.remove("energia")
aireLinea.classList.remove("energia")
bombaLinea.classList.remove("energia")
}

// CONTACTORES
let A=false,B=false,fallo=false

function activarA(){
if(fallo)return estadoCont.innerHTML="FALLA"
if(B)return estadoCont.innerHTML="ENCLAVADO"
A=true
contA.classList.add("energia")
}

function activarB(){
if(fallo)return estadoCont.innerHTML="FALLA"
if(A)return estadoCont.innerHTML="ENCLAVADO"
B=true
contB.classList.add("energia")
}

function falla(){
fallo=true
contA.classList.remove("energia")
contB.classList.remove("energia")
estadoCont.innerHTML="FALLA GENERAL"
}

function reset(){
fallo=false
A=false
B=false
contA.classList.remove("energia")
contB.classList.remove("energia")
estadoCont.innerHTML="NORMAL"
}

// TANQUE
function activarTanque(){tanqueLinea.classList.add("energia")}
function apagarTanque(){tanqueLinea.classList.remove("energia")}

// MOTOR
function activarMotor(){motorLinea.classList.add("energia")}
function apagarMotor(){motorLinea.classList.remove("energia")}

// CALCULADORA
let ultimo=""

function calcular(){
let i=potencia.value/voltaje.value
let total=(+materiales.value||0)+(+mano.value||0)
resultado.innerHTML=i.toFixed(2)+" A"
presupuesto.innerHTML="$"+total
ultimo=cliente.value+" $"+total
}

function guardar(){
let h=JSON.parse(localStorage.getItem("h"))||[]
h.push(ultimo)
localStorage.setItem("h",JSON.stringify(h))
mostrar()
}

function mostrar(){
let h=JSON.parse(localStorage.getItem("h"))||[]
historial.innerHTML=h.join("<br>")
}

function borrar(){
localStorage.removeItem("h")
mostrar()
}

function whatsapp(){
window.open("https://wa.me/?text="+encodeURIComponent(ultimo))
}

function pdf(){
let w=window.open("")
w.document.write(ultimo)
w.print()
}

// CONSUMO
function consumo(){
consumoRes.innerHTML=((potenciaC.value*horas.value*30)/1000).toFixed(2)+" kWh"
}

window.onload=mostrar
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
