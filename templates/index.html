<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eléctrica PRO MAX</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {background:#000;color:#fff;text-align:center;}
.btn-pro {width:85%; margin:10px; font-size:18px;}
.resultado {color:#00eaff; font-size:20px; margin-top:10px;}
.lista {text-align:left; margin:20px;}
pre {background:#111;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<h2 style="color:#00bcff;">⚡ ELÉCTRICA PRO MAX</h2>

<!-- BOTONES -->
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#enchufe">🔌 ENCHUFE</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#llave">💡 LLAVE</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tablero">⚡ TABLERO</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#tanque">💧 TANQUE</button>
<button class="btn btn-dark btn-pro" data-bs-toggle="modal" data-bs-target="#motor">🏭 MOTOR</button>
<button class="btn btn-primary btn-pro" data-bs-toggle="modal" data-bs-target="#reversible">🔄 REVERSIBLE</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#estrella">⚡ ESTRELLA</button>
<button class="btn btn-light btn-pro" data-bs-toggle="modal" data-bs-target="#cables">🎨 CABLES</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#plc">🧠 PLC</button>
<button class="btn btn-secondary btn-pro" data-bs-toggle="modal" data-bs-target="#cablesCalc">📊 CABLE</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#imagenes">📷 IMÁGENES</button>

<hr>

<!-- CALCULADORA -->
<h4>⚙ CALCULADORA + PRESUPUESTO</h4>
<input id="voltaje" class="form-control w-75 mx-auto" placeholder="Voltaje"><br>
<input id="potencia" class="form-control w-75 mx-auto" placeholder="Potencia"><br>
<input id="materiales" class="form-control w-75 mx-auto" placeholder="Materiales ($)"><br>
<input id="mano" class="form-control w-75 mx-auto" placeholder="Mano de obra ($)"><br>

<button class="btn btn-primary btn-pro" onclick="calcular()">CALCULAR</button>

<div id="resultado" class="resultado"></div>
<div id="presupuesto" class="lista"></div>

<button class="btn btn-success btn-pro" onclick="guardar()">GUARDAR</button>
<button class="btn btn-success btn-pro" onclick="enviarWhatsApp()">📲 WhatsApp</button>
<button class="btn btn-light btn-pro" onclick="generarPDF()">🧾 PDF</button>

<hr>

<h4>📊 CONSUMO MENSUAL</h4>
<input id="potenciaConsumo" class="form-control w-75 mx-auto" placeholder="Potencia (W)"><br>
<input id="horas" class="form-control w-75 mx-auto" placeholder="Horas/día"><br>
<button class="btn btn-warning btn-pro" onclick="calcularConsumo()">CALCULAR</button>
<div id="resultadoConsumo" class="resultado"></div>

<hr>

<h4>📂 HISTORIAL</h4>
<div id="historial" class="lista"></div>
<button class="btn btn-danger btn-pro" onclick="borrarHistorial()">BORRAR</button>

<!-- MODALES BÁSICOS -->
<div class="modal fade" id="enchufe"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body"><pre>🔴 FASE → TOMA → 🔵 NEUTRO
🟡🟢 TIERRA → CENTRO</pre></div></div></div></div>

<div class="modal fade" id="llave"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body"><pre>🔴 FASE → LLAVE → 💡</pre></div></div></div></div>

<div class="modal fade" id="tablero"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body"><pre>🔴 FASE → TÉRMICA → DISYUNTOR</pre></div></div></div></div>

<div class="modal fade" id="tanque"><div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-body"><pre>🔴 FASE → FLOTANTE → BOMBA</pre></div></div></div></div>

<!-- MOTOR -->
<div class="modal fade" id="motor">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<button onclick="onMotor()">MARCHA</button>
<button onclick="offMotor()">PARO</button>
<div id="estadoMotor">🔴 APAGADO</div>
</div></div></div></div>

<!-- REVERSIBLE -->
<div class="modal fade" id="reversible">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<button onclick="adelante()">ADELANTE</button>
<button onclick="atras()">ATRÁS</button>
<button onclick="paro()">PARO</button>
<div id="rev">🔴 PARADO</div>
</div></div></div></div>

<!-- ESTRELLA -->
<div class="modal fade" id="estrella">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<button onclick="estrella()">ARRANCAR</button>
<button onclick="stopE()">PARO</button>
<div id="est">🔴 DETENIDO</div>
</div></div></div></div>

<!-- CABLES -->
<div class="modal fade" id="cables">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body">
<pre>
🔴 FASE
🔵 NEUTRO
🟡🟢 TIERRA
</pre>
</div></div></div></div>

<!-- PLC -->
<div class="modal fade" id="plc">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<span id="k1" style="width:30px;height:30px;background:#330000;border-radius:50%;display:inline-block"></span>
<span id="k2" style="width:30px;height:30px;background:#330000;border-radius:50%;display:inline-block"></span>
<br><br>
<button onclick="startPLC()">INICIAR</button>
<button onclick="stopPLC()">PARO</button>
<div id="estadoPLC">DETENIDO</div>
</div></div></div></div>

<!-- CABLE CALC -->
<div class="modal fade" id="cablesCalc">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body">
<input id="corrienteCable" class="form-control" placeholder="Corriente (A)">
<br>
<button onclick="calcCable()">CALCULAR</button>
<div id="resCable"></div>
</div></div></div></div>

<!-- IMÁGENES -->
<div class="modal fade" id="imagenes">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Electrical_panel.jpg" class="img-fluid">
<br><br>
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Power_socket.jpg" class="img-fluid">
</div></div></div></div>

<script>
let ult="";

function calcular(){
let v=voltaje.value,p=potencia.value;
let m=parseFloat(materiales.value)||0;
let mo=parseFloat(mano.value)||0;
let i=p/v;
let t=m+mo;
resultado.innerHTML=i.toFixed(2)+" A";
presupuesto.innerHTML="💰 $"+t;
ult="Presupuesto $"+t+" | "+i.toFixed(2)+"A";
}

function enviarWhatsApp(){
window.open("https://wa.me/549XXXXXXXXXX?text="+encodeURIComponent(ult));
}

function generarPDF(){
let w=window.open("");
w.document.write("<h2>Presupuesto</h2><hr><p>"+ult+"</p>");
w.print();
}

function calcularConsumo(){
let k=(potenciaConsumo.value*horas.value*30)/1000;
resultadoConsumo.innerHTML=k.toFixed(2)+" kWh";
}

function guardar(){
let d=JSON.parse(localStorage.getItem("t"))||[];
d.push(ult);
localStorage.setItem("t",JSON.stringify(d));
mostrar();
}

function mostrar(){
let d=JSON.parse(localStorage.getItem("t"))||[];
historial.innerHTML=d.join("<br>");
}

function borrarHistorial(){
localStorage.removeItem("t");
mostrar();
}

function onMotor(){estadoMotor.innerHTML="ENCENDIDO";}
function offMotor(){estadoMotor.innerHTML="APAGADO";}

function adelante(){rev.innerHTML="ADELANTE";}
function atras(){rev.innerHTML="ATRÁS";}
function paro(){rev.innerHTML="PARADO";}

function estrella(){
est.innerHTML="⭐...";
setTimeout(()=>{est.innerHTML="🔺"},3000);
}
function stopE(){est.innerHTML="DETENIDO";}

function startPLC(){
estadoPLC.innerHTML="KM1";
k1.style.background="lime";
setTimeout(()=>{
estadoPLC.innerHTML="KM1+KM2";
k2.style.background="yellow";
},2000);
}
function stopPLC(){
estadoPLC.innerHTML="DETENIDO";
k1.style.background="#330000";
k2.style.background="#330000";
}

function calcCable(){
let i=parseFloat(corrienteCable.value);
let r="1.5 mm²";
if(i>10) r="2.5 mm²";
if(i>16) r="4 mm²";
if(i>25) r="6 mm²";
if(i>32) r="10 mm²";
resCable.innerHTML="Sección: "+r;
}

window.onload=mostrar;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
