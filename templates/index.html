<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>⚡ ELÉCTRICA PRO ULTRA FINAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#000;color:#fff;text-align:center;}
.btn-pro{width:90%;margin:5px;}

.linea{height:6px;margin:6px;border-radius:5px;background:gray;}

.energia{
background:linear-gradient(90deg, red, yellow, red);
background-size:200% 100%;
animation:flujo 1s linear infinite;
}
@keyframes flujo{0%{background-position:0%}100%{background-position:200%}}

.luz{width:60px;height:60px;border-radius:50%;background:#222;margin:10px auto;}
.bomba{padding:10px;background:#222;margin:10px;}

svg{background:#111;border-radius:10px}
</style>
</head>

<body>

<h2>⚡ ELÉCTRICA PRO ULTRA FINAL</h2>

<button class="btn btn-success btn-pro" onclick="energia()">ENERGIZAR</button>
<button class="btn btn-danger btn-pro" onclick="corte()">CORTAR</button>

<hr>

<h4>💡 SIMULADOR</h4>
<button onclick="toggleLuz()">LUZ</button>
<div id="luz" class="luz"></div>

<button onclick="toggleBomba()">BOMBA</button>
<div id="bomba" class="bomba">OFF</div>

<div id="fase" class="linea"></div>
<div id="neutro" class="linea"></div>
<div id="tierra" class="linea"></div>

<hr>

<h4>🏭 INDUSTRIAL</h4>
<button onclick="marcha()">MARCHA</button>
<button onclick="parada()">PARADA</button>
<div id="lineaMotor" class="linea"></div>

<hr>

<h4>🎨 PLANO REAL</h4>
<svg width="600" height="250">
<rect x="20" y="100" width="100" height="80" stroke="white" fill="none"/>
<text x="25" y="90">TABLERO</text>

<rect x="200" y="110" width="40" height="40" stroke="white" fill="none"/>
<text x="200" y="100">LLAVE</text>

<circle cx="500" cy="80" r="25" stroke="white" fill="none"/>
<text x="480" y="50">LÁMPARA</text>

<line id="cable1" x1="120" y1="140" x2="200" y2="130" stroke="gray" stroke-width="4"/>
<line id="cable2" x1="240" y1="130" x2="500" y2="80" stroke="gray" stroke-width="4"/>
</svg>

<hr>

<h4>⚡ TABLERO PRO</h4>
<div id="luzLinea" class="linea"></div>
<button onclick="toggleLinea('luzLinea')">LUZ</button>

<div id="tomaLinea" class="linea"></div>
<button onclick="toggleLinea('tomaLinea')">TOMA</button>

<br>
<button onclick="sobrecarga()">🔥 SOBRECARGA</button>
<div id="estadoTablero"></div>

<hr>

<h4>⚙ CONTACTORES</h4>
<div id="contA" class="linea"></div>
<div id="contB" class="linea"></div>

<button onclick="activarA()">A</button>
<button onclick="activarB()">B</button>
<button onclick="reset()">RESET</button>

<hr>

<h4>💧 TANQUE</h4>
<div id="tanqueLinea" class="linea"></div>
<button onclick="activarTanque()">ON</button>
<button onclick="apagarTanque()">OFF</button>

<hr>

<h4>🏭 MOTOR</h4>
<div id="motorLinea" class="linea"></div>
<button onclick="activarMotor()">ON</button>
<button onclick="apagarMotor()">OFF</button>

<hr>

<h4>💰 CALCULADORA</h4>
<input id="cliente" placeholder="Cliente"><br>
<input id="potencia" placeholder="Potencia"><br>
<input id="voltaje" placeholder="Voltaje"><br>
<input id="materiales" placeholder="Materiales"><br>
<input id="mano" placeholder="Mano de obra"><br>

<button onclick="calcular()">CALCULAR</button>

<div id="resultado"></div>
<div id="presupuesto"></div>

<button onclick="guardar()">Guardar</button>
<button onclick="whatsapp()">WhatsApp</button>
<button onclick="pdf()">PDF</button>

<hr>

<h4>📊 CONSUMO</h4>
<input id="potenciaC" placeholder="Potencia">
<input id="horas" placeholder="Horas">
<button onclick="consumo()">CALCULAR</button>
<div id="consumoRes"></div>

<hr>

<h4>📂 HISTORIAL</h4>
<div id="historial"></div>
<button onclick="borrar()">BORRAR</button>

<script>

// ===== ESTADO =====
let energiaOn=false,luz=false,bomba=false,A=false,B=false;
let ultimo="";

// ===== ENERGIA =====
function energia(){
energiaOn=true;
["fase","neutro","tierra","cable1","cable2"].forEach(id=>{
document.getElementById(id).classList.add("energia");
});
}

function corte(){
energiaOn=false;
document.querySelectorAll(".linea").forEach(el=>el.classList.remove("energia"));
document.getElementById("cable1").classList.remove("energia");
document.getElementById("cable2").classList.remove("energia");
}

// ===== SIMULADOR =====
function toggleLuz(){
if(!energiaOn)return;
luz=!luz;
document.getElementById("luz").style.background=luz?"yellow":"#222";
}

function toggleBomba(){
if(!energiaOn)return;
bomba=!bomba;
document.getElementById("bomba").innerHTML=bomba?"ON":"OFF";
}

// ===== INDUSTRIAL =====
function marcha(){
if(!energiaOn)return;
lineaMotor.classList.add("energia");
}

function parada(){
lineaMotor.classList.remove("energia");
}

// ===== TABLERO =====
function toggleLinea(id){
document.getElementById(id).classList.toggle("energia");
}

function sobrecarga(){
estadoTablero.innerHTML="🔥 CORTE AUTOMÁTICO";
["luzLinea","tomaLinea"].forEach(id=>{
document.getElementById(id).classList.remove("energia");
});
}

// ===== CONTACTORES =====
function activarA(){
if(B)return;
A=true;
contA.classList.add("energia");
contB.classList.remove("energia");
}

function activarB(){
if(A)return;
B=true;
contB.classList.add("energia");
contA.classList.remove("energia");
}

function reset(){
A=false;B=false;
contA.classList.remove("energia");
contB.classList.remove("energia");
}

// ===== TANQUE =====
function activarTanque(){tanqueLinea.classList.add("energia")}
function apagarTanque(){tanqueLinea.classList.remove("energia")}

// ===== MOTOR =====
function activarMotor(){motorLinea.classList.add("energia")}
function apagarMotor(){motorLinea.classList.remove("energia")}

// ===== CALCULADORA =====
function calcular(){
let i=potencia.value/voltaje.value;
let total=(+materiales.value||0)+(+mano.value||0);
resultado.innerHTML=i.toFixed(2)+" A";
presupuesto.innerHTML="$"+total;
ultimo=cliente.value+" $"+total;
}

function guardar(){
let h=JSON.parse(localStorage.getItem("h"))||[];
h.push(ultimo);
localStorage.setItem("h",JSON.stringify(h));
mostrar();
}

function mostrar(){
let h=JSON.parse(localStorage.getItem("h"))||[];
historial.innerHTML=h.join("<br>");
}

function borrar(){localStorage.removeItem("h");mostrar();}

function whatsapp(){window.open("https://wa.me/?text="+encodeURIComponent(ultimo));}

function pdf(){
let w=window.open("");
w.document.write(ultimo);
w.print();
}

function consumo(){
consumoRes.innerHTML=((potenciaC.value*horas.value*30)/1000).toFixed(2)+" kWh";
}

window.onload=mostrar;

</script>

</body>
</html>
