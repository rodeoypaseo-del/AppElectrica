<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eléctrica PRO</title>
    <!-- CSS de Bootstrap -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; padding: 20px; }
        .boton-manual { 
            background: #1a1a1a; border: 1px solid #444; border-radius: 10px; 
            padding: 20px; margin-bottom: 10px; width: 100%; color: white;
        }
        .img-esquema { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <h3 class="text-center text-info mb-4">⚡ ELÉCTRICA PRO</h3>

    <!-- BOTÓN MEDIDOR -->
    <button class="boton-manual" data-bs-toggle="modal" data-bs-target="#m1">
        🔌 VER ESQUEMA MEDIDOR
    </button>

    <!-- VENTANA EMERGENTE -->
    <div class="modal fade" id="m1" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-info">
                <div class="modal-header">
                    <h5 class="modal-title">Esquema Medidor</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <img src="https://googleusercontent.com" class="img-esquema">
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT DE BOOTSTRAP (La llave que abre todo) -->
    <script src="https://jsdelivr.net"></script>
</body>
</html>
