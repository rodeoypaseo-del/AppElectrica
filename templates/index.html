<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eléctrica PRO FINAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {background:#000;color:#fff;text-align:center;}
.btn-pro {width:90%; margin:8px; font-size:16px;}
.resultado {color:#00eaff; font-size:18px; margin-top:10px;}
pre {background:#111;padding:10px;border-radius:10px;}
.linea {height:4px;margin:5px;}
.rojo {background:red;}
.azul {background:cyan;}
.tierra {background:yellow;}
</style>
</head>

<body>

<h2 style="color:#00bcff;">⚡ ELÉCTRICA PRO FINAL</h2>

<!-- BOTONES -->
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#plano">🎨 PLANO</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#enchufe">🔌 ENCHUFE</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#llave">💡 LLAVE</button>
<button class="btn btn-danger btn-pro" data-bs-toggle="modal" data-bs-target="#tablero">⚡ TABLERO</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#tanque">💧 TANQUE</button>
<button class="btn btn-dark btn-pro" data-bs-toggle="modal" data-bs-target="#motor">🏭 MOTOR</button>
<button class="btn btn-primary btn-pro" data-bs-toggle="modal" data-bs-target="#reversible">🔄 REVERSIBLE</button>
<button class="btn btn-warning btn-pro" data-bs-toggle="modal" data-bs-target="#estrella">⚡ ESTRELLA</button>
<button class="btn btn-info btn-pro" data-bs-toggle="modal" data-bs-target="#plc">🧠 PLC</button>
<button class="btn btn-secondary btn-pro" data-bs-toggle="modal" data-bs-target="#cable">📊 CABLE</button>
<button class="btn btn-success btn-pro" data-bs-toggle="modal" data-bs-target="#imagenes">📷 IMÁGENES</button>

<hr>

<!-- CALCULADORA -->
<h4>⚙ CALCULADORA</h4>
<input id="voltaje" class="form-control w-75 mx-auto" placeholder="Voltaje"><br>
<input id="potencia" class="form-control w-75 mx-auto" placeholder="Potencia"><br>
<button class="btn btn-primary btn-pro" onclick="calc()">CALCULAR</button>
<div id="res" class="resultado"></div>

<hr>

<!-- PLANO -->
<div class="modal fade" id="plano">
<div class="modal-dialog modal-lg">
<div class="modal-content bg-dark text-white">
<div class="modal-body">
<h5>🎨 Plano</h5>
<p>🔴 Fase</p><div class="linea rojo"></div>
<p>🔵 Neutro</p><div class="linea azul"></div>
<p>🟡🟢 Tierra</p><div class="linea tierra"></div>
<pre>Fase pasa por llave / neutro directo</pre>
</div>
</div>
</div>
</div>

<!-- ENCHUFE -->
<div class="modal fade" id="enchufe">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body"><pre>🔴 derecha
🔵 izquierda
🟡🟢 centro</pre></div></div></div></div>

<!-- LLAVE -->
<div class="modal fade" id="llave">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body"><pre>🔴 fase corta
🔵 neutro directo</pre></div></div></div></div>

<!-- TABLERO -->
<div class="modal fade" id="tablero">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body"><pre>fase → térmica → disyuntor</pre></div></div></div></div>

<!-- TANQUE -->
<div class="modal fade" id="tanque">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body"><pre>fase → flotante → bomba</pre></div></div></div></div>

<!-- MOTOR -->
<div class="modal fade" id="motor">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<button onclick="m='ON';estadoMotor()">MARCHA</button>
<button onclick="m='OFF';estadoMotor()">PARO</button>
<div id="motorEstado">OFF</div>
</div></div></div></div>

<!-- REVERSIBLE -->
<div class="modal fade" id="reversible">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<button onclick="rev('ADELANTE')">ADELANTE</button>
<button onclick="rev('ATRÁS')">ATRÁS</button>
<div id="revEstado">PARADO</div>
</div></div></div></div>

<!-- ESTRELLA -->
<div class="modal fade" id="estrella">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<button onclick="est()">ARRANQUE</button>
<div id="estEstado">DETENIDO</div>
</div></div></div></div>

<!-- PLC -->
<div class="modal fade" id="plc">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body text-center">
<button onclick="plc()">INICIAR</button>
<div id="plcEstado">OFF</div>
</div></div></div></div>

<!-- CABLE -->
<div class="modal fade" id="cable">
<div class="modal-dialog"><div class="modal-content bg-dark text-white">
<div class="modal-body">
<input id="amp" class="form-control" placeholder="Amperes"><br>
<button onclick="calcCable()">CALCULAR</button>
<div id="cableRes"></div>
</div></div></div></div>

<!-- IMÁGENES (ARREGLADO) -->
<div class="modal fade" id="imagenes">
<div class="modal-dialog modal-fullscreen">
<div class="modal-content bg-dark text-white">

<div class="modal-header">
<h5>📷 Instalaciones</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body text-center">

<img src="https://images.unsplash.com/photo-1581092588429-5a2b2b3f1c5d" style="width:100%;margin-bottom:20px;">
<img src="https://images.unsplash.com/photo-1581091012184-5c2d8c5c0d6d" style="width:100%;">

</div>

</div>
</div>
</div>

<script>
function calc(){res.innerHTML=(potencia.value/voltaje.value).toFixed(2)+" A";}

let m="OFF";
function estadoMotor(){motorEstado.innerHTML=m;}

function rev(x){revEstado.innerHTML=x;}

function est(){estEstado.innerHTML="⭐ → 🔺";}

function plc(){plcEstado.innerHTML="AUTO";}

function calcCable(){
let i=amp.value;
let s="1.5";
if(i>10)s="2.5";
if(i>16)s="4";
if(i>25)s="6";
cableRes.innerHTML=s+" mm²";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
