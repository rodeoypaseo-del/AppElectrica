<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eléctrica PRO MAX REAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {background:#000;color:#fff;text-align:center;}
.btn-pro {width:90%; margin:5px;}
.linea{height:6px;margin:6px;border-radius:5px;background:gray;}
.luz{width:60px;height:60px;border-radius:50%;background:#222;margin:10px auto;}
.bomba{padding:10px;background:#222;margin:10px;}
</style>
</head>

<body>

<h2 style="color:#00bcff;">⚡ SIMULADOR ELÉCTRICO REAL</h2>

<button class="btn btn-success btn-pro" onclick="energia()">⚡ ENERGIZAR</button>
<button class="btn btn-danger btn-pro" onclick="corte()">⛔ CORTAR</button>

<hr>

<h4>💡 Luz</h4>
<button onclick="llave()">💡 LLAVE</button>
<div id="luz" class="luz"></div>

<h4>💧 Bomba automática</h4>
<button onclick="flotante()">💧 FLOTANTE</button>
<div id="bomba" class="bomba">BOMBA OFF</div>

<hr>

<div id="fase" class="linea"></div>
<div id="neutro" class="linea"></div>
<div id="tierra" class="linea"></div>

<div id="estado">SIN ENERGÍA</div>

<script>

let energiaOn=false;
let luzOn=false;
let flotanteOn=false;

function energia(){
energiaOn=true;
fase.style.background="red";
neutro.style.background="cyan";
tierra.style.background="yellow";
estado.innerHTML="⚡ SISTEMA ENERGIZADO";
actualizar();
}

function corte(){
energiaOn=false;
fase.style.background="gray";
neutro.style.background="gray";
tierra.style.background="gray";
estado.innerHTML="⛔ SIN ENERGÍA";
luz.style.background="#222";
bomba.innerHTML="BOMBA OFF";
}

function llave(){
luzOn=!luzOn;
actualizar();
}

function flotante(){
flotanteOn=!flotanteOn;
actualizar();
}

function actualizar(){

// LUZ
if(energiaOn && luzOn){
luz.style.background="yellow";
}else{
luz.style.background="#222";
}

// BOMBA
if(energiaOn && flotanteOn){
bomba.innerHTML="💧 BOMBA ENCENDIDA";
bomba.style.background="green";
}else{
bomba.innerHTML="BOMBA OFF";
bomba.style.background="#222";
}

}

</script>

</body>
</html>
